                  + "      else if(l.length===0&&ct.length>0){cues.push({s:s,e:e2,t:ct});ct='';s=0;e2=0;}\n"
                  + "    }\n"
                  + "    if(ct.length>0&&s>0)cues.push({s:s,e:e2,t:ct});\n"
                  + "    if(cues.length===0)return;\n"
                  + "    window._aioCues=cues;\n"
                  + "    if(window._aioSyncT)clearInterval(window._aioSyncT);\n"
                  + "    window._aioSyncT=setInterval(function(){\n"
                  + "      var vid=document.querySelector('video');\n"
                  + "      if(!vid||vid.paused)return;\n"
                  + "      var ct2=vid.currentTime;\n"
                  + "      for(var j=0;j<cues.length;j++){\n"
                  + "        if(ct2>=cues[j].s&&ct2<cues[j].e){\n"
                  // Truyền dur = thời gian sub VTT
                  + "          _show(cues[j].t,(cues[j].e-cues[j].s)*1000);\n"
                  + "          return;\n"
                  + "        }\n"
                  + "      }\n"
                  + "    },200);\n"
                  + "  };\n"
                  + "  function _ts(str){\n"
                  + "    var p=str.replace(',','.').trim().split(':');\n"
                  + "    var sec=parseFloat(p[p.length-1]||0);\n"
                  + "    var min=parseFloat(p.length>=2?p[p.length-2]:0);\n"
                  + "    var hr=parseFloat(p.length>=3?p[p.length-3]:0);\n"
                  + "    return hr*3600+min*60+sec;\n"
                  + "  }\n"
                  // Auto-detect sub element: không cần biết trước selector
                  + "  var _knownEl=null,_knownDoc=null;\n"
                  + "  function _score(el){\n"
                  + "    try{\n"
                  + "      if(!el)return 0;\n"
                  + "      var t=(el.innerText||el.textContent||'').trim();\n"
                  + "      if(!_ok(t))return 0;\n"
                  + "      if(t.length<2||t.length>300)return 0;\n"
                  + "      try{if(window.getComputedStyle(el).display==='none')return 0;}catch(e){}\n"
                  + "      var sc=0;\n"
                  + "      var r=el.getBoundingClientRect();\n"
                  + "      var vw=window.innerWidth||document.documentElement.clientWidth||1280;\n"
                  + "      var vh=window.innerHeight||document.documentElement.clientHeight||720;\n"
                  + "      if(r.width>0&&r.height>0){\n"
                  + "        if(r.width>vw*0.98&&r.height>vh*0.5)return 0;\n"
                  + "        if(r.top>vh*0.75)sc+=80;else if(r.top>vh*0.6)sc+=50;else if(r.top>vh*0.4)sc+=25;\n"
                  + "        var cx=r.left+r.width/2;\n"
                  + "        if(cx>vw*0.15&&cx<vw*0.85)sc+=25;\n"
                  + "        if(r.width>vw*0.1&&r.width<vw*0.95)sc+=10;\n"
                  + "      }\n"
                  + "      var wc=t.split(/\\s+/).length;\n"
                  + "      if(wc>=2&&wc<=20)sc+=20;else if(wc>20)sc-=10;\n"
                  + "      try{var zi=parseInt(window.getComputedStyle(el).zIndex)||0;\n"
                  + "        if(zi>100)sc+=20;else if(zi>5)sc+=10;}catch(e){}\n"
                  + "      try{var col=window.getComputedStyle(el).color;\n"
                  + "        if(col&&col.indexOf('255, 255, 255')>-1)sc+=25;}catch(e){}\n"
                  + "      try{var fw=window.getComputedStyle(el).fontWeight;\n"
                  + "        if(fw==='bold'||parseInt(fw)>=600)sc+=15;}catch(e){}\n"
                  + "      try{var ts=window.getComputedStyle(el).textShadow;\n"
                  + "        if(ts&&ts!=='none'&&ts!=='')sc+=20;}catch(e){}\n"
                  + "      try{var pos=window.getComputedStyle(el).position;\n"
                  + "        if(pos==='absolute'||pos==='fixed')sc+=15;}catch(e){}\n"
                  + "      var nm=(el.className||'')+(el.id||'');\n"
                  + "      if(/sub|caption|cue|lyric|track/i.test(nm))sc+=30;\n"
                  + "      return sc;\n"
                  + "    }catch(e){return 0;}\n"
                  + "  }\n"
                  + "  function _findBest(doc){\n"
                  + "    if(!doc||!doc.body)return null;\n"
                  + "    var best=null,bestSc=25;\n"
                  + "    var all=doc.querySelectorAll('p,span,div,li');\n"
                  + "    for(var i=0;i<all.length;i++){\n"
                  + "      var sc=_score(all[i]);\n"
                  + "      if(sc>bestSc){bestSc=sc;best=all[i];}\n"
                  + "    }\n"
                  + "    return best;\n"
                  + "  }\n"
                  // JW Player selectors - rophim dùng JW Player
                  + "  var _jwSels=['.jw-text-track-cue','.jw-captions-item',\n"
                  + "    '.jw-captions-text','.jw-caption',\n"
                  + "    '[class*=\"jw-capt\"]','[class*=\"jw-sub\"]'];\n"
                  + "  function _scanJw(doc){\n"
                  + "    if(!doc)return '';\n"
                  + "    for(var i=0;i<_jwSels.length;i++){\n"
                  + "      try{\n"
                  + "        var els=doc.querySelectorAll(_jwSels[i]);\n"
                  + "        for(var j=0;j<els.length;j++){\n"
                  + "          var t=(els[j].innerText||els[j].textContent||'').trim();\n"
                  + "          if(_ok(t))return t;\n"
                  + "        }\n"
                  + "      }catch(e){}\n"
                  + "    }return '';\n"
                  + "  }\n"
                  + "  function _scan(doc){\n"
                  + "    if(!doc)return '';\n"
                  // Ưu tiên JW Player selectors
                  + "    var jw=_scanJw(doc);if(jw){try{window.AIO.onDebug('JW:'+jw.substring(0,30));}catch(e){}return jw;}\n"
                  + "    if(_knownEl&&_knownDoc===doc){\n"
                  + "      try{\n"
                  + "        var ds=window.getComputedStyle(_knownEl).display;\n"
                  + "        if(ds!=='none'){\n"
                  + "          var kt=(_knownEl.innerText||_knownEl.textContent||'').trim();\n"
                  + "          if(_ok(kt))return kt;\n"
                  + "        }\n"
                  + "        _knownEl=null;_knownDoc=null;\n"
                  + "      }catch(e){_knownEl=null;_knownDoc=null;}\n"
                  + "    }\n"
                  + "    var best=_findBest(doc);\n"
                  + "    if(best){\n"
                  + "      _knownEl=best;_knownDoc=doc;\n"
                  + "      var bt=(best.innerText||best.textContent||'').trim();\n"
                  + "      try{window.AIO.onDebug('FOUND:'+best.tagName+'.'+String(best.className).substring(0,20)+'='+bt.substring(0,25));}catch(e){}\n"
                  + "      return bt;\n"
                  + "    }\n"
                  + "    return '';\n"
                  + "  }\n"
                  + "  function _scanAll(){\n"
                  + "    var f=_scan(document);\n"
                  + "    if(f){_show(f);return;}\n"
                  + "    try{\n"
                  + "      var iframes=document.querySelectorAll('iframe');\n"
                  + "      for(var i=0;i<iframes.length;i++){try{\n"
                  + "        var idoc=iframes[i].contentDocument||iframes[i].contentWindow.document;\n"
                  + "        var g=_scan(idoc);\n"
                  + "        if(g){_show(g);return;}\n"
                  + "      }catch(e){}}\n"
                  + "    }catch(e){}\n"
                  + "  }\n"
                  + "  new MutationObserver(_scanAll)\n"
                  + "    .observe(document.body||document.documentElement,{childList:true,subtree:true,characterData:true});\n"
                  // Scan định kỳ 500ms - backup cho MutationObserver
                  + "  setInterval(_scanAll,500);\n"
                  + "  setInterval(function(){\n"
                  + "    try{document.querySelectorAll('iframe').forEach(function(fr){\n"
                  + "      try{var fd=fr.contentDocument||fr.contentWindow.document;\n"
                  + "        if(fd&&fd.body&&!fd._aioMO){fd._aioMO=true;\n"
                  + "          new MutationObserver(_scanAll)\n"
                  + "            .observe(fd.body,{childList:true,subtree:true,characterData:true});}\n"
                  + "      }catch(e){}\n"
                  + "    });}catch(e){}\n"
                  + "  },1000);\n"
                  + "}\n"
                  + "})();";
                  v.evaluateJavascript(js, null);
              }

