name: Build ALL IN ONE Pro (Gradle Version)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Initialize Android Project
        run: |
          # Tạo cấu trúc thư mục chuẩn Gradle
          mkdir -p app/src/main/java/com/allinone/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable-nodpi

          # Tạo file build.gradle (Trái tim của dự án)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.allinone.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.allinone.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          EOF

          echo "include ':app'" > settings.gradle

      - name: Create Manifest & Resources
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="ALL IN ONE Pro" android:theme="@android:style/Theme.NoTitleBar.Fullscreen" android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo '<resources><string name="app_name">ALL IN ONE Pro</string></resources>' > app/src/main/res/values/strings.xml

      - name: Generate Assets (Python)
        run: |
          python3 -c "
          import struct,zlib
          def chunk(n,d): return struct.pack('>I',len(d))+n+d+struct.pack('>I',zlib.crc32(n+d)&0xffffffff)
          def make_png(w,h,gp):
              raw=b''
              for y in range(h):
                  raw+=b'\x00'
                  for x in range(w): raw+=bytes(gp(x,y))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>II',w,h)+bytes([8,6,0,0,0]))+chunk(b'IDAT',zlib.compress(raw,9))+chunk(b'IEND',b'')
          with open('app/src/main/res/drawable-nodpi/ic_launcher.png','wb') as f: f.write(make_png(96,96,lambda x,y: [229,9,20,255] if 40**2<((x-48)**2+(y-48)**2)<46**2 else ([30,30,45,255] if ((x-48)**2+(y-48)**2)<=40**2 else [0,0,0,0])))
          "

      - name: Create Java Source (Cursor & Web)
        run: |
          cat > app/src/main/java/com/allinone/app/CursorView.java << 'EOF'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.*;
          import android.view.View;
          public class CursorView extends View {
              public float x=500, y=300;
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Path m = new Path();
              public CursorView(Context c){ super(c); 
                  m.moveTo(0,0); m.lineTo(0,48); m.lineTo(13,35); m.lineTo(26,58); 
                  m.lineTo(33,54); m.lineTo(20,31); m.lineTo(37,31); m.close();
              }
              @Override protected void onDraw(Canvas c){
                  c.save(); c.translate(x,y);
                  p.setColor(0x66000000); c.drawPath(m,p);
                  c.translate(-2,-2); p.setColor(Color.WHITE); p.setStyle(Paint.Style.FILL); c.drawPath(m,p);
                  p.setColor(Color.BLACK); p.setStyle(Paint.Style.STROKE); p.setStrokeWidth(3); c.drawPath(m,p);
                  c.restore();
              }
          }
          EOF

          cat > app/src/main/java/com/allinone/app/MainActivity.java << 'EOF'
          package com.allinone.app;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.webkit.*;
          import android.widget.FrameLayout;

          public class MainActivity extends Activity {
              private WebView w; private CursorView cv;
              private float step = 10, maxStep = 70;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);
                  FrameLayout l = new FrameLayout(this);
                  w = new WebView(this);
                  w.getSettings().setJavaScriptEnabled(true);
                  w.getSettings().setDomStorageEnabled(true);
                  w.setWebViewClient(new WebViewClient());
                  w.loadUrl("https://www.google.com");
                  cv = new CursorView(this);
                  l.addView(w); l.addView(cv);
                  setContentView(l);
              }
              @Override public boolean onKeyDown(int k, KeyEvent e){
                  float s = (e.getRepeatCount() > 0) ? Math.min(step + (e.getRepeatCount()*3), maxStep) : step;
                  if(k==KeyEvent.KEYCODE_DPAD_UP) cv.y -= s;
                  else if(k==KeyEvent.KEYCODE_DPAD_DOWN) cv.y += s;
                  else if(k==KeyEvent.KEYCODE_DPAD_LEFT) cv.x -= s;
                  else if(k==KeyEvent.KEYCODE_DPAD_RIGHT) cv.x += s;
                  else if(k==KeyEvent.KEYCODE_DPAD_CENTER || k==KeyEvent.KEYCODE_ENTER){
                      long t = SystemClock.uptimeMillis();
                      w.dispatchTouchEvent(MotionEvent.obtain(t,t,MotionEvent.ACTION_DOWN,cv.x,cv.y,0));
                      w.dispatchTouchEvent(MotionEvent.obtain(t,t+50,MotionEvent.ACTION_UP,cv.x,cv.y,0));
                  } else return super.onKeyDown(k,e);
                  cv.x = Math.max(0, Math.min(cv.x, getResources().getDisplayMetrics().widthPixels));
                  cv.y = Math.max(0, Math.min(cv.y, getResources().getDisplayMetrics().heightPixels));
                  cv.invalidate(); return true;
              }
          }
          EOF

      - name: Build with Gradle
        run: |
          chmod +x /usr/share/gradle/bin/gradle || true
          gradle build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AllInOne-Pro-Gradle
          path: app/build/outputs/apk/release/app-release-unsigned.apk
