name: Build ALL IN ONE Pro APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/28.0.3" >> $GITHUB_PATH

      - name: Create Project Structure
        run: mkdir -p src/com/allinone/app res/layout res/values res/drawable obj bin

      - name: Generate Pro Assets (Python)
        run: |
          python3 -c "
          import struct,zlib
          def chunk(n,d): return struct.pack('>I',len(d))+n+d+struct.pack('>I',zlib.crc32(n+d)&0xffffffff)
          def make_png(w,h,gp):
              raw=b''
              for y in range(h):
                  raw+=b'\x00'
                  for x in range(w): raw+=bytes(gp(x,y))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>II',w,h)+bytes([8,6,0,0,0]))+chunk(b'IDAT',zlib.compress(raw,9))+chunk(b'IEND',b'')
          def ip(x,y):
              d2=(x-48)**2+(y-48)**2
              return [229,9,20,255] if 40**2<d2<46**2 else ([30,30,45,255] if d2<=40**2 else [0,0,0,0])
          with open('res/drawable/ic_launcher.png','wb') as f: f.write(make_png(96,96,ip))
          def bp(x,y): return [20,20,35,255] if 10<x<310 and 10<y<170 else [10,10,15,255]
          with open('res/drawable/banner.png','wb') as f: f.write(make_png(320,180,bp))
          "

      - name: Create Manifest & Resources
        run: |
          cat > AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.allinone.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="ALL IN ONE Pro" android:icon="@drawable/ic_launcher" 
                  android:banner="@drawable/banner" android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                  android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF
          echo '<resources><string name="app_name">ALL IN ONE Pro</string></resources>' > res/values/strings.xml

      - name: Create Java Source
        run: |
          cat > src/com/allinone/app/CursorView.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.*;
          import android.view.View;
          public class CursorView extends View {
              public float x=500, y=300;
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              private Path m = new Path();
              public CursorView(Context c){ super(c); 
                  m.moveTo(0,0); m.lineTo(0,48); m.lineTo(13,35); m.lineTo(26,58); 
                  m.lineTo(33,54); m.lineTo(20,31); m.lineTo(37,31); m.close();
              }
              @Override protected void onDraw(Canvas c){
                  c.save(); c.translate(x,y);
                  p.setColor(0x66000000); c.drawPath(m,p);
                  c.translate(-2,-2); p.setColor(Color.WHITE); p.setStyle(Paint.Style.FILL); c.drawPath(m,p);
                  p.setColor(Color.BLACK); p.setStyle(Paint.Style.STROKE); p.setStrokeWidth(3); c.drawPath(m,p);
                  c.restore();
              }
          }
          JEOF
          cat > src/com/allinone/app/MainActivity.java << 'JEOF'
          package com.allinone.app;
          import android.app.Activity;
          import android.os.*;
          import android.view.*;
          import android.webkit.*;
          import android.widget.FrameLayout;

          public class MainActivity extends Activity {
              private WebView w; private CursorView cv;
              private float step = 10, maxStep = 70;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);
                  FrameLayout l = new FrameLayout(this);
                  w = new WebView(this); 
                  w.getSettings().setJavaScriptEnabled(true);
                  w.getSettings().setDomStorageEnabled(true);
                  w.setWebViewClient(new WebViewClient());
                  w.loadUrl("https://www.google.com");
                  cv = new CursorView(this);
                  l.addView(w); l.addView(cv);
                  setContentView(l);
              }
              @Override public boolean onKeyDown(int k, KeyEvent e){
                  float s = (e.getRepeatCount() > 0) ? Math.min(step + (e.getRepeatCount()*3), maxStep) : step;
                  if(k==KeyEvent.KEYCODE_DPAD_UP) cv.y -= s;
                  else if(k==KeyEvent.KEYCODE_DPAD_DOWN) cv.y += s;
                  else if(k==KeyEvent.KEYCODE_DPAD_LEFT) cv.x -= s;
                  else if(k==KeyEvent.KEYCODE_DPAD_RIGHT) cv.x += s;
                  else if(k==KeyEvent.KEYCODE_DPAD_CENTER || k==KeyEvent.KEYCODE_ENTER){
                      long t = SystemClock.uptimeMillis();
                      w.dispatchTouchEvent(MotionEvent.obtain(t,t,MotionEvent.ACTION_DOWN,cv.x,cv.y,0));
                      w.dispatchTouchEvent(MotionEvent.obtain(t,t+50,MotionEvent.ACTION_UP,cv.x,cv.y,0));
                  } else return super.onKeyDown(k,e);
                  cv.x = Math.max(0, Math.min(cv.x, getResources().getDisplayMetrics().widthPixels));
                  cv.y = Math.max(0, Math.min(cv.y, getResources().getDisplayMetrics().heightPixels));
                  cv.invalidate(); return true;
              }
          }
          JEOF

      - name: Build and Sign APK
        run: |
          # Dùng aapt tạo R.java
          aapt package -f -m -J src -M AndroidManifest.xml -S res -I $ANDROID_HOME/platforms/android-28/android.jar
          # Biên dịch Java với mục tiêu Java 8 để d8 không bị lỗi
          javac -source 1.8 -target 1.8 -d obj -cp $ANDROID_HOME/platforms/android-28/android.jar $(find src -name "*.java")
          # Convert class sang dex
          d8 --output bin/ --lib $ANDROID_HOME/platforms/android-28/android.jar $(find obj -name "*.class")
          # Đóng gói APK
          aapt package -f -M AndroidManifest.xml -S res -I $ANDROID_HOME/platforms/android-28/android.jar -F bin/allinone-unsigned.apk
          cd bin && aapt add allinone-unsigned.apk classes.dex && cd ..
          # Ký APK
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android
          apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out bin/allinone-pro.apk bin/allinone-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AllInOne-Pro-APK
          path: bin/allinone-pro.apk
