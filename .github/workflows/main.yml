                              if(e.getRepeatCount()==0&&!urls.isEmpty())openUrl(urls.get(gi));return true;
                          case KeyEvent.KEYCODE_MENU:goSettings();return true;
                          case KeyEvent.KEYCODE_BACK:finish();return true;
                      }
                  }
                  return super.onKeyDown(key,e);
              }
          }
