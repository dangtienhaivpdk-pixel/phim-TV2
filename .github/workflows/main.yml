          cat > src/com/allinone/app/CursorView.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.util.AttributeSet;
          import android.view.View;
          public class CursorView extends View {
              private final Paint wFill, bStroke, rDot;
              private float cx = -1, cy = -1;
              public CursorView(Context c) { super(c); wFill=pw(); bStroke=ps(); rDot=pd(); }
              public CursorView(Context c, AttributeSet a) { super(c,a); wFill=pw(); bStroke=ps(); rDot=pd(); }
              private Paint pw(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFFFFFFF);p.setStyle(Paint.Style.FILL);return p;}
              private Paint ps(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFF000000);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(2.5f);p.setStrokeJoin(Paint.Join.ROUND);return p;}
              private Paint pd(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFE50914);p.setStyle(Paint.Style.FILL);return p;}
              public void setPos(float x, float y) { cx=x; cy=y; invalidate(); }
              public float getCX() { return cx; }
              public float getCY() { return cy; }
              @Override protected void onDraw(Canvas c) {
                  if (cx < 0 || cy < 0) return;
                  Path p = new Path();
                  p.moveTo(cx,cy); p.lineTo(cx,cy+22); p.lineTo(cx+6,cy+16);
                  p.lineTo(cx+13,cy+27); p.lineTo(cx+16,cy+25);
                  p.lineTo(cx+9,cy+14); p.lineTo(cx+17,cy+14); p.close();
                  c.drawPath(p, bStroke); c.drawPath(p, wFill);
                  c.drawCircle(cx, cy, 3.5f, rDot);
              }
          }
          JEOF

