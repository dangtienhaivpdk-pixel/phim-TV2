              // ── Sub fetch (Java network layer, bypass cross-origin) ────────────────
              private void fetchAndParseSub(String url) {
                  java.net.HttpURLConnection conn = null;
                  try {
                      java.net.URL u = new java.net.URL(url);
                      conn = (java.net.HttpURLConnection) u.openConnection();
                      conn.setRequestMethod("GET");
                      conn.setConnectTimeout(5000); conn.setReadTimeout(10000);
                      conn.setRequestProperty("User-Agent", "Mozilla/5.0");
                      conn.setRequestProperty("Referer", "https://pointnorth.io/");
                      if (conn.getResponseCode() == 200) {
                          java.io.BufferedReader br = new java.io.BufferedReader(
                              new java.io.InputStreamReader(conn.getInputStream(), "UTF-8"));
                          StringBuilder sb = new StringBuilder();
                          String line;
                          while ((line = br.readLine()) != null) { sb.append(line).append("\n"); }
                          br.close();
                          final String content = sb.toString();
                          handler.post(new Runnable() {
                              @Override public void run() { injectSubCues(content); }
                          });
                      }
                  } catch (Exception e) {}
                  finally { if (conn != null) conn.disconnect(); }
              }

              private void injectSubCues(String vttContent) {
                  String escaped = vttContent
                      .replace("\\", "\\\\")
                      .replace("'", "\\'")
                      .replace("\n", "\\n")
                      .replace("\r", "");
                  webView.evaluateJavascript("if(window._pvtt)window._pvtt('" + escaped + "');", null);
              }

              // ── TTS ────────────────────────────────────────────────────────────────
              private float getSpeechRate() {
                  SharedPreferences p = getSharedPreferences(SettingsActivity.PREF, Context.MODE_PRIVATE);
                  int s = p.getInt(SettingsActivity.KEY_SPEED, 1);
                  if (s == 0) return 0.75f;
                  if (s == 2) return 1.4f;
                  return 1.0f;
              }

              private void setupTts() {
                  tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                      @Override public void onInit(int status) {
                          if (status == TextToSpeech.SUCCESS) {
                              java.util.Locale vi = new java.util.Locale("vi", "VN");
                              int res = tts.isLanguageAvailable(vi);
                              if (res >= TextToSpeech.LANG_AVAILABLE) {
                                  tts.setLanguage(vi);
                              } else {
                                  // Thử locale mặc định của hệ thống
                                  try { tts.setLanguage(java.util.Locale.getDefault()); }
                                  catch (Exception ex) { tts.setLanguage(java.util.Locale.ENGLISH); }
                              }
                              tts.setSpeechRate(1.0f);
                              tts.setPitch(1.0f);
                              ttsReady = true;
                          }
                      }
                  });
                  // Đặt volume kênh audio lên cao nhất
                  try {
                      android.media.AudioManager am = (android.media.AudioManager)
                          getSystemService(Context.AUDIO_SERVICE);
                      if (am != null) {
                          int max = am.getStreamMaxVolume(android.media.AudioManager.STREAM_MUSIC);
                          int cur = am.getStreamVolume(android.media.AudioManager.STREAM_MUSIC);
                          // Chỉ tăng nếu đang ở 0
                          if (cur == 0) am.setStreamVolume(android.media.AudioManager.STREAM_MUSIC, max / 2, 0);
                      }
                  } catch (Exception e) {}
              }

              private void speakVi(final String text) {
                  if (text == null || text.isEmpty()) return;
                  boolean hasLetter = false;
                  for (int ci = 0; ci < text.length(); ci++) {
                      if (Character.isLetter(text.charAt(ci))) { hasLetter = true; break; }
                  }
                  if (!hasLetter) return;
                  SharedPreferences p = getSharedPreferences(SettingsActivity.PREF, Context.MODE_PRIVATE);
                  if (!p.getBoolean(SettingsActivity.KEY_SUB, true)) return;
                  String norm = text.trim().toLowerCase();
                  if (norm.equals(lastSubText)) return;
                  lastSubText = norm;
                  final int vi = p.getInt(SettingsActivity.KEY_VOICE, 0);
                  final float rate = getSpeechRate();
                  if (vi < 2) {
                      // Edge TTS neural - chạy trong background thread
                      final String voice = EDGE_VOICES[vi];
                      edgeExec.execute(new Runnable() {
                          @Override public void run() { playEdgeTts(text, voice, rate); }
                      });
                  } else {
                      // Android TTS fallback
                      if (!ttsReady || tts == null) return;
                      subHandler.post(new Runnable() {
                          @Override public void run() {
                              tts.setSpeechRate(rate);
                              tts.stop();
                              android.os.Bundle params = new android.os.Bundle();
                              params.putInt(TextToSpeech.Engine.KEY_PARAM_STREAM,
                                  android.media.AudioManager.STREAM_MUSIC);
                              tts.speak(text, TextToSpeech.QUEUE_FLUSH, params, "sub");
                          }
                      });
                  }
              }

              private void playEdgeTts(String text, String voice, float rate) {
                  java.net.HttpURLConnection conn = null;
                  try {
                      int pct = (int) ((rate - 1f) * 100);
                      String rateStr = (pct >= 0 ? "+" : "") + pct + "%";
                      String ssml = "<speak version='1.0' xml:lang='vi-VN'>"
                          + "<voice name='" + voice + "'><prosody rate='" + rateStr + "'>"
                          + text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")
                          + "</prosody></voice></speak>";
                      String uid = java.util.UUID.randomUUID().toString().replace("-", "");
                      java.net.URL url = new java.net.URL(
                          "https://speech.platform.bing.com/consumer/speech/synthesize"
                          + "/readaloud/edge/v1?trustedclienttoken=6A5AA1D4EAFF4E9FB37E23D68491D6F4"
                          + "&ConnectionId=" + uid);
                      conn = (java.net.HttpURLConnection) url.openConnection();
                      conn.setRequestMethod("POST");
                      conn.setRequestProperty("Content-Type", "application/ssml+xml");
                      conn.setRequestProperty("X-Microsoft-OutputFormat", "audio-24khz-48kbitrate-mono-mp3");
                      conn.setRequestProperty("User-Agent", "Mozilla/5.0");
                      conn.setDoOutput(true);
                      conn.setConnectTimeout(6000); conn.setReadTimeout(12000);
                      conn.getOutputStream().write(ssml.getBytes("UTF-8"));
                      int rc = conn.getResponseCode();
                      if (rc == 200) {
                          java.io.File tmp = java.io.File.createTempFile("tts", ".mp3", getCacheDir());
                          java.io.InputStream is = conn.getInputStream();
                          java.io.FileOutputStream fos = new java.io.FileOutputStream(tmp);
                          byte[] buf = new byte[4096]; int n;
                          while ((n = is.read(buf)) != -1) fos.write(buf, 0, n);
                          fos.close(); is.close();
                          final java.io.File ftmp = tmp;
                          subHandler.post(new Runnable() {
                              @Override public void run() {
                                  try {
                                      if (edgePlayer != null) {
                                          try { edgePlayer.stop(); } catch (Exception ex) {}
                                          edgePlayer.release(); edgePlayer = null;
                                      }
                                      edgePlayer = new android.media.MediaPlayer();
                                      edgePlayer.setAudioStreamType(android.media.AudioManager.STREAM_MUSIC);
                                      edgePlayer.setDataSource(ftmp.getAbsolutePath());
                                      edgePlayer.prepare();
                                      edgePlayer.start();
                                      edgePlayer.setOnCompletionListener(
                                          new android.media.MediaPlayer.OnCompletionListener() {
                                              @Override public void onCompletion(android.media.MediaPlayer mp) {
                                                  mp.release(); edgePlayer = null; ftmp.delete();
                                              }
                                          });
                                  } catch (Exception e) { ftmp.delete(); fallbackTts(text, rate); }
                              }
                          });
                      } else {
                          // Edge TTS trả lỗi (rc != 200) → thử Google TTS
                          playGoogleTts(text, rate);
                      }
                  } catch (Exception e) {
                      // Mạng lỗi → thử Google TTS
                      playGoogleTts(text, rate);
                  } finally { if (conn != null) conn.disconnect(); }
              }

              // Google TTS API - miễn phí, hỗ trợ tiếng Việt tốt
              private void playGoogleTts(final String text, final float rate) {
                  edgeExec.execute(new Runnable() {
                      @Override public void run() {
                          java.net.HttpURLConnection conn2 = null;
                          try {
                              String encoded = java.net.URLEncoder.encode(text, "UTF-8");
                              // Giới hạn 200 ký tự mỗi lần
                              if (encoded.length() > 300) encoded = java.net.URLEncoder.encode(
                                  text.substring(0, Math.min(text.length(), 150)), "UTF-8");
                              String ttsUrl = "https://translate.google.com/translate_tts"
                                  + "?ie=UTF-8&q=" + encoded
                                  + "&tl=vi&total=1&idx=0&client=tw-ob&ttsspeed=" + rate;
                              java.net.URL u2 = new java.net.URL(ttsUrl);
                              conn2 = (java.net.HttpURLConnection) u2.openConnection();
                              conn2.setRequestMethod("GET");
                              conn2.setConnectTimeout(6000); conn2.setReadTimeout(10000);
                              conn2.setRequestProperty("User-Agent",
                                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36");
                              conn2.setRequestProperty("Referer", "https://translate.google.com/");
                              if (conn2.getResponseCode() == 200) {
                                  java.io.File tmp2 = java.io.File.createTempFile("gtts", ".mp3", getCacheDir());
                                  java.io.InputStream is2 = conn2.getInputStream();
                                  java.io.FileOutputStream fos2 = new java.io.FileOutputStream(tmp2);
                                  byte[] buf2 = new byte[4096]; int n2;
                                  while ((n2 = is2.read(buf2)) != -1) fos2.write(buf2, 0, n2);
                                  fos2.close(); is2.close();
                                  final java.io.File ftmp2 = tmp2;
                                  subHandler.post(new Runnable() {
                                      @Override public void run() {
                                          try {
                                              if (edgePlayer != null) {
                                                  try { edgePlayer.stop(); } catch (Exception ex) {}
                                                  edgePlayer.release(); edgePlayer = null;
                                              }
                                              edgePlayer = new android.media.MediaPlayer();
                                              edgePlayer.setAudioStreamType(android.media.AudioManager.STREAM_MUSIC);
                                              edgePlayer.setDataSource(ftmp2.getAbsolutePath());
                                              edgePlayer.prepare(); edgePlayer.start();
                                              edgePlayer.setOnCompletionListener(
                                                  new android.media.MediaPlayer.OnCompletionListener() {
                                                      @Override public void onCompletion(android.media.MediaPlayer mp) {
                                                          mp.release(); edgePlayer = null; ftmp2.delete();
                                                      }
                                                  });
                                          } catch (Exception e) { ftmp2.delete(); fallbackTts(text, rate); }
                                      }
                                  });
                              } else { fallbackTts(text, rate); }
                          } catch (Exception e) { fallbackTts(text, rate); }
                          finally { if (conn2 != null) conn2.disconnect(); }
                      }
                  });
              }

              private void fallbackTts(final String text, final float rate) {
                  subHandler.post(new Runnable() {
                      @Override public void run() {
                          if (!ttsReady || tts == null) return;
                          // Xin audio focus để không bị video át
                          try {
                              android.media.AudioManager am = (android.media.AudioManager)
                                  getSystemService(Context.AUDIO_SERVICE);
                              if (am != null) am.requestAudioFocus(null,
                                  android.media.AudioManager.STREAM_MUSIC,
                                  android.media.AudioManager.AUDIOFOCUS_GAIN_TRANSIENT_MAY_DUCK);
                          } catch (Exception e) {}
                          tts.setSpeechRate(rate);
                          tts.stop();
                          tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "sub");
                      }
                  });
              }

              // ── Speech recognition ─────────────────────────────────────────────────
              private void setupSpeech() {
                  if (!SpeechRecognizer.isRecognitionAvailable(this)) return;
                  speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle p) { voiceResult.setText("Đang nghe..."); }
                      @Override public void onResults(Bundle r) {
                          ArrayList<String> m = r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (m != null && !m.isEmpty()) {
                              final String tt = m.get(0).toLowerCase();
                              voiceResult.setText(m.get(0));
                              handler.postDelayed(new Runnable() { @Override public void run() { hideVoice(); } }, 800);
                              handleVoice(tt);
                          } else hideVoice();
                      }
                      @Override public void onError(int err) {
                          voiceResult.setText("Loi nhan giong");
                          handler.postDelayed(new Runnable() { @Override public void run() { hideVoice(); } }, 1500);
                      }
                      @Override public void onBeginningOfSpeech() {}
                      @Override public void onRmsChanged(float v) {}
                      @Override public void onBufferReceived(byte[] b) {}
                      @Override public void onEndOfSpeech() {}
                      @Override public void onPartialResults(Bundle b) {}
                      @Override public void onEvent(int t, Bundle b) {}
                  });
              }

              private void handleVoice(String t) {
                  if (t.contains("phat") || t.contains("play"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();", null);
                  else if (t.contains("dung") || t.contains("pause"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();", null);
                  else if (t.contains("tua toi"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                  else if (t.contains("tua lui"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                  else if (t.contains("trang chu") || t.contains("home")) finish();
                  else if (t.contains("cai dat"))
                      startActivity(new Intent(MainActivity.this, SettingsActivity.class));
              }

              private void showVoice() {
                  if (speechRecognizer == null) return;
                  voiceOverlay.setVisibility(View.VISIBLE); voiceResult.setText("");
                  Intent i = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "vi-VN");
                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 3);
                  speechRecognizer.startListening(i);
              }

              private void hideVoice() {
                  if (speechRecognizer != null) speechRecognizer.stopListening();
                  voiceOverlay.setVisibility(View.GONE);
              }

              // ── Cursor helpers ─────────────────────────────────────────────────────
              private void wakeC() {
                  if (!cursorVisible) { cursorView.setVisibility(View.VISIBLE); cursorVisible = true; }
                  handler.removeCallbacks(hideCursorRun);
                  handler.postDelayed(hideCursorRun, HIDE_DELAY);
              }

              private float[] wc() {
                  return new float[]{cursorView.getCX(), cursorView.getCY()};
              }

              private void tDown(float x, float y) {
                  long t = android.os.SystemClock.uptimeMillis();
                  webView.dispatchTouchEvent(MotionEvent.obtain(t, t, MotionEvent.ACTION_DOWN, x, y, 0));
              }

              private void tUp(float x, float y, long dt) {
                  long t = android.os.SystemClock.uptimeMillis();
                  webView.dispatchTouchEvent(MotionEvent.obtain(dt, t, MotionEvent.ACTION_UP, x, y, 0));
              }

              private void tMove(float x, float y, long dt) {
                  long t = android.os.SystemClock.uptimeMillis();
                  webView.dispatchTouchEvent(MotionEvent.obtain(dt, t, MotionEvent.ACTION_MOVE, x, y, 0));
              }

              private void click() {
                  float[] rc = wc();
                  long t = android.os.SystemClock.uptimeMillis();
                  tDown(rc[0], rc[1]); tUp(rc[0], rc[1], t);
              }

              private void pgScroll(int dy) {
                  webView.scrollBy(0, dy);
              }

              private void moveCursor(float dx, float dy, int rep) {
                  float factor = Math.min(1f, rep / ACCEL);
                  float step = STEP_MIN + (STEP_MAX - STEP_MIN) * factor;
                  float nx = Math.max(0, Math.min(screenW - 1, cursorView.getCX() + dx * step));
                  float ny = cursorView.getCY() + dy * step;
                  // Edge auto-scroll khi cursor chạm cạnh trên/dưới
                  int nd = 0;
                  if (ny >= screenH - 10) nd = 1;
                  else if (ny <= 10) nd = -1;
                  ny = Math.max(0, Math.min(screenH - 2, ny));
                  cursorView.setPos(nx, ny);
                  savedCX = nx; savedCY = ny;
                  if (dragMode) {
                      int[] l = new int[2]; webView.getLocationOnScreen(l);
                      tMove(nx - l[0], ny - l[1], dragT);
                  }
                  if (nd != edgeDir) {
                      edgeDir = nd; edgeTick = 0;
                      handler.removeCallbacks(edgeRun);
                      if (nd != 0) handler.post(edgeRun);
                  }
                  // Hiện bottomBar khi cursor vào góc trái dưới
                  boolean inZ = nx <= BAR_W && ny >= screenH - BAR_H;
                  if (inZ && !barVisible) {
                      bottomBar.setVisibility(View.VISIBLE); barVisible = true;
                      handler.removeCallbacks(hideBarRun);
                  } else if (!inZ && barVisible) {
                      handler.removeCallbacks(hideBarRun);
                      handler.postDelayed(hideBarRun, 1800);
                  }
                  wakeC();
              }

              private void stopEdge() { edgeDir = 0; edgeTick = 0; handler.removeCallbacks(edgeRun); }

              private void clickAtBarOrWeb() {
                  wakeC(); stopEdge();
                  float sx = cursorView.getCX(), sy = cursorView.getCY();
                  if (barVisible) {
                      int[] ids = {R.id.btnHome, R.id.btnWebBack, R.id.btnWebForward, R.id.btnRefresh, R.id.btnSettingsWeb};
                      for (int id : ids) {
                          View b = findViewById(id);
                          int[] loc = new int[2]; b.getLocationOnScreen(loc);
                          if (sx >= loc[0] && sx < loc[0] + b.getWidth() &&
                              sy >= loc[1] && sy < loc[1] + b.getHeight()) {
                              b.performClick(); return;
                          }
                      }
                  }
                  click();
              }

              private void toggleDrag() {
                  if (!dragMode) {
                      dragMode = true; dragT = android.os.SystemClock.uptimeMillis();
                      float[] rc = wc(); tDown(rc[0], rc[1]);
                      cursorView.setMode(CursorView.MODE_DRAG);
                  } else {
                      dragMode = false; float[] rc = wc(); tUp(rc[0], rc[1], dragT);
                      cursorView.setMode(CursorView.MODE_NORMAL);
                  }
              }

              // ── Key handling ───────────────────────────────────────────────────────
              @Override public boolean onKeyDown(int key, KeyEvent e) {
                  wakeC();
                  if (voiceOverlay.getVisibility() == View.VISIBLE) {
                      if (key == KeyEvent.KEYCODE_BACK) { hideVoice(); return true; }
                      return true;
                  }
                  int rep = e.getRepeatCount();
                  switch (key) {
                      case KeyEvent.KEYCODE_DPAD_UP:    moveCursor(0, -1, rep); return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:  moveCursor(0,  1, rep); return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:  moveCursor(-1, 0, rep); return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT: moveCursor( 1, 0, rep); return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                      case KeyEvent.KEYCODE_ENTER:
                          if (rep == 0) {
                              okDown = true; okT = android.os.SystemClock.uptimeMillis();
                              float[] rc = wc(); okX = rc[0]; okY = rc[1];
                              if (dragMode) { toggleDrag(); }
                              else { handler.postDelayed(holdRun, HOLD_MS); }
                          }
                          return true;
                      case KeyEvent.KEYCODE_MENU:
                          if (rep == 0) toggleDrag(); return true;
                      // Channel-/L1/PageUp = scroll lên
                      case KeyEvent.KEYCODE_BUTTON_L1:
                      case KeyEvent.KEYCODE_CHANNEL_DOWN:
                      case KeyEvent.KEYCODE_PAGE_UP:
                          cursorView.setMode(CursorView.MODE_SCROLL); pgScroll(-SCR_AMT);
                          handler.removeCallbacks(clrScrollMode); handler.postDelayed(clrScrollMode, 300);
                          return true;
                      // Channel+/R1/PageDown = scroll xuống
                      case KeyEvent.KEYCODE_BUTTON_R1:
                      case KeyEvent.KEYCODE_CHANNEL_UP:
                      case KeyEvent.KEYCODE_PAGE_DOWN:
                          cursorView.setMode(CursorView.MODE_SCROLL); pgScroll(SCR_AMT);
                          handler.removeCallbacks(clrScrollMode); handler.postDelayed(clrScrollMode, 300);
                          return true;
                      case KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE:
                      case KeyEvent.KEYCODE_MEDIA_PLAY:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}", null);
                          return true;
                      case KeyEvent.KEYCODE_MEDIA_FAST_FORWARD:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                          return true;
                      case KeyEvent.KEYCODE_MEDIA_REWIND:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                          return true;
                      case KeyEvent.KEYCODE_SEARCH:
                      case KeyEvent.KEYCODE_VOICE_ASSIST:
                          showVoice(); return true;
                      case KeyEvent.KEYCODE_BACK:
                          if (dragMode) { dragMode = false; cursorView.setMode(CursorView.MODE_NORMAL); return true; }
                          if (webView.canGoBack()) { webView.goBack(); return true; }
                          finish(); return true;
                  }
                  return super.onKeyDown(key, e);
              }

              @Override public boolean onKeyUp(int key, KeyEvent e) {
                  if (key == KeyEvent.KEYCODE_DPAD_UP || key == KeyEvent.KEYCODE_DPAD_DOWN
                      || key == KeyEvent.KEYCODE_DPAD_LEFT || key == KeyEvent.KEYCODE_DPAD_RIGHT) stopEdge();
                  if ((key == KeyEvent.KEYCODE_DPAD_CENTER || key == KeyEvent.KEYCODE_ENTER) && okDown) {
                      okDown = false; handler.removeCallbacks(holdRun);
                      long held = android.os.SystemClock.uptimeMillis() - okT;
                      if (!dragMode) {
                          if (held < HOLD_MS) {
                              clickAtBarOrWeb();
                          } else {
                              tUp(okX, okY, okT);
                              cursorView.setMode(CursorView.MODE_NORMAL);
                          }
                      }
                      return true;
                  }
                  return super.onKeyUp(key, e);
              }

              @Override protected void onPause() {
                  super.onPause(); webView.onPause();
                  savedCX = cursorView.getCX(); savedCY = cursorView.getCY();
                  if (dragMode) { dragMode = false; float[] rc = wc(); tUp(rc[0], rc[1], dragT); }
                  stopEdge(); handler.removeCallbacksAndMessages(null);
              }

              @Override protected void onResume() {
                  super.onResume(); webView.onResume(); wakeC();
                  // Sync trạng thái sub xuống JS mỗi khi quay lại
                  SharedPreferences rp = getSharedPreferences(SettingsActivity.PREF, Context.MODE_PRIVATE);
                  final boolean subOn = rp.getBoolean(SettingsActivity.KEY_SUB, true);
                  webView.evaluateJavascript("window._aioSubOn=" + subOn + ";", null);
              }

              @Override protected void onDestroy() {
                  handler.removeCallbacksAndMessages(null);
                  subHandler.removeCallbacksAndMessages(null);
                  if (edgePlayer != null) { edgePlayer.stop(); edgePlayer.release(); edgePlayer = null; }
                  edgeExec.shutdownNow();
                  if (tts != null) { tts.stop(); tts.shutdown(); tts = null; }
                  if (speechRecognizer != null) speechRecognizer.destroy();
                  super.onDestroy();
              }
          }

          JEOF

      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml -S res -J build/gen -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/allinone/app/R.java \
            src/com/allinone/app/CursorView.java \
            src/com/allinone/app/ScrollWebView.java \
            src/com/allinone/app/HomeActivity.java \
            src/com/allinone/app/SettingsActivity.java \
            src/com/allinone/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx --dex --output=build/classes.dex build/classes
          cp build/resources.ap_ build/allinone.apk
          cd build && zip -u allinone.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/allinone.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=AllInOne,O=AllInOne,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out ALLINONE.apk build/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALLINONE
          path: ALLINONE.apk
          retention-days: 30
