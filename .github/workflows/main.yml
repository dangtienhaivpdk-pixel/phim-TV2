              private void hlCard(int idx,boolean on){
                  if(idx<0||idx>=cards.size())return;
                  LinearLayout w=cards.get(idx);String url=urls.get(idx);
                  String act=prefs.getString(KEY_URL,DEF);
                  if(on){w.setBackgroundColor(CLR_RED);w.setPadding(4,4,4,4);
