                      bSel.setOnClickListener(new View.OnClickListener(){
                          @Override public void onClick(View v){saveAndOpen(url);}});
                      TextView bEdt=mkBtn(" \u270e ",0xff226600);
                      bEdt.setOnClickListener(new View.OnClickListener(){
                          @Override public void onClick(View v){openDialog(url);}});
                      TextView bDel=mkBtn("  X  ",0xff880000);
