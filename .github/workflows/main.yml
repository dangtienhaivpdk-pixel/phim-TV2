                          inputOverlay.setVisibility(View.VISIBLE);
                          inputOverlayEdit.requestFocus();
                          handler.postDelayed(new Runnable(){@Override public void run(){
                              imm.showSoftInput(inputOverlayEdit,InputMethodManager.SHOW_FORCED);
                          }},100);
                      }});
                  }
                  private void submitInputOverlay(){
                      final String raw=inputOverlayEdit.getText().toString();
                      closeInputOverlay();
                      webView.post(new Runnable(){@Override public void run(){
                          StringBuilder js=new StringBuilder();
                          js.append("(function(){var el=document.activeElement;");
                          js.append("if(el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')){");
                          js.append("try{");
                          js.append("var d=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value');");
                          js.append("if(d&&d.set)d.set.call(el,unescape('");
                          js.append(android.net.Uri.encode(raw).replace("+","%20"));
                          js.append("'));else el.value=unescape('");
                          js.append(android.net.Uri.encode(raw).replace("+","%20"));
                          js.append("');}catch(ex){}");
                          js.append("el.dispatchEvent(new Event('input',{bubbles:true}));");
                          js.append("el.dispatchEvent(new Event('change',{bubbles:true}));");
