              private class KbdBridge {
                  @android.webkit.JavascriptInterface
                  public void onInputFocus(){handler.post(new Runnable(){@Override public void run(){
                      Toast.makeText(MainActivity.this,"JS: input focused",Toast.LENGTH_SHORT).show();
                      showKbd();}});}
                  private void showKbd(){
                      Toast.makeText(MainActivity.this,"Keyboard triggered",Toast.LENGTH_SHORT).show();
                      webView.evaluateJavascript(
                          "(function(){var el=document.activeElement;"
                          +"var v=el&&el.value?el.value:'';"
                          +"var p=el&&el.placeholder?el.placeholder:'Nhap tim kiem';"
                          +"return v+'||SEP||'+p;})()",
                          new android.webkit.ValueCallback<String>(){
                              @Override public void onReceiveValue(String res){
                                  String val="",hint="Nhap tim kiem";
                                  if(res!=null&&!res.equals("null")){
                                      res=res.replaceAll("^"|"$","");
                                      String[]parts=res.split("\\|\\|SEP\\|\\|",2);
                                      if(parts.length>0)val=parts[0];
                                      if(parts.length>1&&!parts[1].isEmpty())hint=parts[1];
                                  }
                                  openInputOverlay(val,hint);
                              }
                          });
                  }
                  private void openInputOverlay(final String current,final String hint){
                      handler.post(new Runnable(){@Override public void run(){
                          inputOverlayTitle.setText(hint);
