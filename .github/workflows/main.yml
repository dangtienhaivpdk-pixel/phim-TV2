              private void moveCursor(float dx,float dy,int rep){
                  wakeC();
                  float t=Math.min(1f,rep/ACCEL);
                  float step=STEP_MIN+(STEP_MAX-STEP_MIN)*t;
                  float nx=Math.max(0,Math.min(screenW-2,cursorView.getCX()+dx*step));
                  float ny=cursorView.getCY()+dy*step;
                  int nd=0;if(ny>=screenH-5)nd=1;else if(ny<=5)nd=-1;
                  ny=Math.max(0,Math.min(screenH-2,ny));
                  cursorView.setPos(nx,ny);savedCX=nx;savedCY=ny;
                  if(dragMode){int[]l=new int[2];webView.getLocationOnScreen(l);tMove(nx-l[0],ny-l[1],dragT);}
                  if(nd!=edgeDir){edgeDir=nd;edgeTick=0;handler.removeCallbacks(edgeRun);if(nd!=0)handler.post(edgeRun);}
                  boolean inZ=nx<=BAR_W&&ny>=screenH-BAR_H;
                  if(inZ&&!barVisible){bottomBar.setVisibility(View.VISIBLE);barVisible=true;handler.removeCallbacks(hideBarRun);}
                  else if(!inZ&&barVisible){handler.removeCallbacks(hideBarRun);handler.postDelayed(hideBarRun,1800);}
              }
              private void stopEdge(){edgeDir=0;edgeTick=0;handler.removeCallbacks(edgeRun);}
              @Override public boolean onKeyDown(int key,KeyEvent e){
                  wakeC();
                  if(inputOverlay.getVisibility()==View.VISIBLE){
                      if(key==KeyEvent.KEYCODE_BACK){closeInputOverlay();return true;}
                      if((key==KeyEvent.KEYCODE_DPAD_CENTER||key==KeyEvent.KEYCODE_ENTER)&&e.getRepeatCount()==0){submitInputOverlay();return true;}
                      return false;}
                  if(voiceOverlay.getVisibility()==View.VISIBLE){
                      if(key==KeyEvent.KEYCODE_BACK){hideVoice();return true;}return true;}
                  int rep=e.getRepeatCount();
                  switch(key){
                      case KeyEvent.KEYCODE_DPAD_UP:   moveCursor(0,-1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN: moveCursor(0, 1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT: moveCursor(-1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:moveCursor( 1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                      case KeyEvent.KEYCODE_ENTER:
                          if(rep==0){
                              okDown=true;okT=SystemClock.uptimeMillis();
                              float[]rc=wc();okX=rc[0];okY=rc[1];
                              if(dragMode){toggleDrag();}
                              else{handler.postDelayed(holdRun,HOLD_MS);}
                          }
                          return true;
                      case KeyEvent.KEYCODE_MENU:if(rep==0)toggleDrag();return true;
                      case KeyEvent.KEYCODE_BUTTON_L1:case KeyEvent.KEYCODE_CHANNEL_DOWN:case KeyEvent.KEYCODE_PAGE_UP:
                          cursorView.setMode(CursorView.MODE_SCROLL);pgScroll(-SCR_AMT);
                          handler.removeCallbacks(clrScrollMode);handler.postDelayed(clrScrollMode,300);return true;
                      case KeyEvent.KEYCODE_BUTTON_R1:case KeyEvent.KEYCODE_CHANNEL_UP:case KeyEvent.KEYCODE_PAGE_DOWN:
                          cursorView.setMode(CursorView.MODE_SCROLL);pgScroll(SCR_AMT);
                          handler.removeCallbacks(clrScrollMode);handler.postDelayed(clrScrollMode,300);return true;
                      case KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE:case KeyEvent.KEYCODE_MEDIA_PLAY:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_FAST_FORWARD:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_REWIND:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);return true;
                      case KeyEvent.KEYCODE_SEARCH:case KeyEvent.KEYCODE_VOICE_ASSIST:showVoice();return true;
                      case KeyEvent.KEYCODE_BACK:
                          if(dragMode){dragMode=false;cursorView.setMode(CursorView.MODE_NORMAL);return true;}
                          if(webView.canGoBack()){webView.goBack();return true;}
                          finish();return true;
                  }
                  return super.onKeyDown(key,e);
              }
              @Override public boolean onKeyUp(int key,KeyEvent e){
                  if(key==KeyEvent.KEYCODE_DPAD_UP||key==KeyEvent.KEYCODE_DPAD_DOWN
                      ||key==KeyEvent.KEYCODE_DPAD_LEFT||key==KeyEvent.KEYCODE_DPAD_RIGHT)stopEdge();
                  if((key==KeyEvent.KEYCODE_DPAD_CENTER||key==KeyEvent.KEYCODE_ENTER)&&okDown){
                      okDown=false;handler.removeCallbacks(holdRun);
                      long held=SystemClock.uptimeMillis()-okT;
                      if(!dragMode){
                          if(held<HOLD_MS){clickAtBarOrWeb();}
                          else{tUp(okX,okY,okT);cursorView.setMode(CursorView.MODE_NORMAL);}
                      }
                      return true;
                  }
                  return super.onKeyUp(key,e);
              }
              private void clickAtBarOrWeb(){
                  wakeC();stopEdge();
                  float sx=cursorView.getCX(),sy=cursorView.getCY();
                  if(barVisible){
                      int[]ids={R.id.btnHome,R.id.btnWebBack,R.id.btnWebForward,R.id.btnRefresh,R.id.btnSettingsWeb};
                      for(int id:ids){View b=findViewById(id);int[]loc=new int[2];b.getLocationOnScreen(loc);
                          if(sx>=loc[0]&&sx<loc[0]+b.getWidth()&&sy>=loc[1]&&sy<loc[1]+b.getHeight()){b.performClick();return;}}
                  }
                  click();
              }
              private void toggleDrag(){
                  if(!dragMode){dragMode=true;dragT=SystemClock.uptimeMillis();
                      float[]rc=wc();tDown(rc[0],rc[1]);cursorView.setMode(CursorView.MODE_DRAG);
                  }else{dragMode=false;float[]rc=wc();tUp(rc[0],rc[1],dragT);cursorView.setMode(CursorView.MODE_NORMAL);}
              }
              private void setupSpeech(){
                  if(!SpeechRecognizer.isRecognitionAvailable(this))return;
                  speechRecognizer=SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener(){
                      @Override public void onReadyForSpeech(Bundle p){voiceResult.setText("\u0110ang nghe...");}
                      @Override public void onResults(Bundle r){
                          ArrayList<String>m=r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if(m!=null&&!m.isEmpty()){final String tt=m.get(0).toLowerCase();
                          voiceResult.setText(m.get(0));
                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},800);
                          handleVoice(tt);}else hideVoice();}
                      @Override public void onError(int err){voiceResult.setText("L\u1ed7i nh\u1eadn gi\u1ecdng");
                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},1500);}
                      @Override public void onBeginningOfSpeech(){}@Override public void onRmsChanged(float v){}
                      @Override public void onBufferReceived(byte[]b){}@Override public void onEndOfSpeech(){}
                      @Override public void onPartialResults(Bundle b){}@Override public void onEvent(int t,Bundle b){}
                  });
              }
              private void handleVoice(String t){
                  if(t.contains("ph\u00e1t")||t.contains("play"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();",null);
                  else if(t.contains("d\u1eebng")||t.contains("pause"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();",null);
                  else if(t.contains("tua t\u1edbi"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);
                  else if(t.contains("tua l\u00f9i"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);
                  else if(t.contains("trang ch\u1ee7")||t.contains("home"))finish();
                  else if(t.contains("c\u00e0i \u0111\u1eb7t"))startActivity(new Intent(MainActivity.this,SettingsActivity.class));
              }
              private void showVoice(){
                  if(speechRecognizer==null)return;
                  voiceOverlay.setVisibility(View.VISIBLE);voiceResult.setText("");
                  Intent i=new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE,"vi-VN");
                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS,3);
                  speechRecognizer.startListening(i);
              }
              private void hideVoice(){if(speechRecognizer!=null)speechRecognizer.stopListening();voiceOverlay.setVisibility(View.GONE);}
              @Override protected void onPause(){
                  super.onPause();webView.onPause();
                  savedCX=cursorView.getCX();savedCY=cursorView.getCY();
                  if(dragMode){dragMode=false;float[]rc=wc();tUp(rc[0],rc[1],dragT);}
                  stopEdge();handler.removeCallbacksAndMessages(null);}
              @Override protected void onResume(){super.onResume();webView.onResume();wakeC();}
              @Override protected void onDestroy(){
                  handler.removeCallbacksAndMessages(null);
                  if(speechRecognizer!=null)speechRecognizer.destroy();
                  webView.destroy();super.onDestroy();}
          }
          }
          JEOF
      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml -S res -J build/gen -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/allinone/app/R.java \
            src/com/allinone/app/CursorView.java \
            src/com/allinone/app/ScrollWebView.java \
            src/com/allinone/app/HomeActivity.java \
            src/com/allinone/app/SettingsActivity.java \
            src/com/allinone/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx --dex --output=build/classes.dex build/classes
          cp build/resources.ap_ build/allinone.apk
          cd build && zip -u allinone.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/allinone.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=AllInOne,O=AllInOne,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out ALLINONE.apk build/aligned.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALLINONE
          path: ALLINONE.apk
          retention-days: 30
