              private void openDialog(String prefill){
                  dialogPrefill=prefill;
                  dialogInput.setText(prefill!=null?prefill:"https://");
                  if(prefill!=null&&!prefill.isEmpty())dialogInput.setSelection(prefill.length());
                  else dialogInput.setSelection(dialogInput.getText().length());
                  dialogOverlay.setVisibility(View.VISIBLE);
                  wakeC();
                  handler.postDelayed(new Runnable(){@Override public void run(){
                      dialogInput.requestFocus();
                      imm.showSoftInput(dialogInput,InputMethodManager.SHOW_FORCED);}},80);
              }
              private void closeDialog(){
                  dialogOverlay.setVisibility(View.GONE);
                  imm.hideSoftInputFromWindow(dialogInput.getWindowToken(),0);
                  wakeC();
              }
              private void saveFromDialog(){
                  String u=dialogInput.getText().toString().trim();
                  if(u.isEmpty()||u.equals("https://")){closeDialog();return;}
                  if(!u.startsWith("http"))u="https://"+u;
                  closeDialog();saveAndOpen(u);
