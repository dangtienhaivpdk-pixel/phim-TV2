name: Build ALL IN ONE APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/28.0.3" >> $GITHUB_PATH

      - name: Create project files
        run: |
          mkdir -p src/com/allinone/app res/layout res/values res/drawable

          python3 -c "
          import struct, zlib
          def make_png(w, h, get_pixel):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += bytes(get_pixel(x, y))
              png = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>II', w, h) + bytes([8, 6, 0, 0, 0])
              png += chunk(b'IHDR', ihdr)
              png += chunk(b'IDAT', zlib.compress(raw, 9))
              png += chunk(b'IEND', b'')
              return png
          def icon_pixel(x, y):
              cx, cy, r = 48, 48, 46
              dx, dy = x-cx, y-cy
              if dx*dx+dy*dy > r*r: return [0,0,0,0]
              if dx*dx+dy*dy > 40*40: return [180,150,80,255]
              film_top=8; film_bot=88; strip_h=14
              in_top=(film_top<=y<=film_top+strip_h)
              in_bot=(film_bot-strip_h<=y<=film_bot)
              if in_top or in_bot:
                  sx=(x-4)%16
                  sy=y-film_top-3 if in_top else y-(film_bot-strip_h)-3
                  if 2<=sx<=10 and 2<=sy<=8: return [220,210,180,255]
                  return [60,40,20,255]
              rel_y=y-(film_top+strip_h+1)
              scene_h=(film_bot-strip_h)-(film_top+strip_h+1)
              if scene_h>0:
                  t=rel_y/scene_h
                  noise=((x*13+y*7)%20)-10
                  if t<0.45: br,bg2,bb=int(200+noise),int(170+noise),int(120+noise//2)
                  elif t<0.55: br,bg2,bb=int(140+noise),int(100+noise),int(60+noise//2)
                  else: br,bg2,bb=int(120+noise),int(85+noise),int(45+noise//2)
                  px=48
                  if 0.30<=t<=0.42 and abs(x-px)<=5: return [30,20,10,255]
                  if 0.42<=t<=0.65 and abs(x-px)<=3: return [30,20,10,255]
                  if 0.65<=t<=0.80 and (abs(x-(px-3))<=2 or abs(x-(px+3))<=2): return [30,20,10,255]
                  return [max(0,min(255,br)),max(0,min(255,bg2)),max(0,min(255,bb)),255]
              return [20,20,20,255]
          with open('res/drawable/ic_launcher.png','wb') as f:
              f.write(make_png(96,96,icon_pixel))
          def banner_pixel(x, y):
              noise=((x*13+y*7)%20)-10
              t_y=y/180
              if t_y<0.4: br,bg2,bb=int(180+noise),int(150+noise),int(100+noise//2)
              elif t_y<0.55: br,bg2,bb=int(120+noise),int(90+noise),int(50+noise//2)
              else: br,bg2,bb=int(100+noise),int(70+noise),int(35+noise//2)
              sh=20; in_top2=y<=sh; in_bot2=y>=180-sh
              if in_top2 or in_bot2:
                  sx=(x-4)%24; sy=y-3 if in_top2 else y-(180-sh)-3
                  if 3<=sx<=16 and 3<=sy<=12: return [220,210,180,255]
                  return [40,25,10,255]
              return [max(0,min(255,br)),max(0,min(255,bg2)),max(0,min(255,bb)),255]
          with open('res/drawable/banner.png','wb') as f:
              f.write(make_png(320,180,banner_pixel))
          print('Icons OK')
          "

