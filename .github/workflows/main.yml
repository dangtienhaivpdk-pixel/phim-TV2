                      bu.setLayoutParams(new LinearLayout.LayoutParams(ViewGroup.LayoutParams.WRAP_CONTENT,ViewGroup.LayoutParams.WRAP_CONTENT));
                      bu.setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){saveUrl(url);openUrl(url);}});
                      TextView bd=new TextView(this); bd.setText("  X  "); bd.setTextColor(Color.WHITE);
                      bd.setBackgroundColor(0xff770000); bd.setTextSize(12); bd.setPadding(14,8,14,8); bd.setFocusable(false); bd.setClickable(true);
                      LinearLayout.LayoutParams dp=new LinearLayout.LayoutParams(ViewGroup.LayoutParams.WRAP_CONTENT,ViewGroup.LayoutParams.WRAP_CONTENT);
