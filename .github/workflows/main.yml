                  int rep=e.getRepeatCount();
                  switch(key){
                      case KeyEvent.KEYCODE_DPAD_UP: moveCursor(0,-1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN: moveCursor(0,1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT: moveCursor(-1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT: moveCursor(1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER: case KeyEvent.KEYCODE_ENTER:
                          if(rep==0) click(); return true;
                      case KeyEvent.KEYCODE_CHANNEL_UP: case KeyEvent.KEYCODE_PAGE_UP:
                          scrollPage(-SCR_AMT);return true;
                      case KeyEvent.KEYCODE_CHANNEL_DOWN: case KeyEvent.KEYCODE_PAGE_DOWN:
                          scrollPage(SCR_AMT);return true;
                      case KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE: case KeyEvent.KEYCODE_MEDIA_PLAY:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}try{var jw=jwplayer();if(jw){var st=jw.getState();if(st==='playing')jw.pause();else jw.play();}}catch(e){}",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_FAST_FORWARD:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_REWIND:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);return true;
                      case KeyEvent.KEYCODE_MENU: showVoice();return true;
                      case KeyEvent.KEYCODE_BACK:
                          if(webView.canGoBack()){webView.goBack();return true;}finish();return true;
                  }
                  return super.onKeyDown(key,e);}

              @Override public boolean onKeyUp(int key, KeyEvent e){return super.onKeyUp(key,e);}

              @Override protected void onPause(){
                  super.onPause(); webView.onPause();
                  savedCX=cursorView.getCX(); savedCY=cursorView.getCY();
                  handler.removeCallbacksAndMessages(null);}
              @Override protected void onResume(){
                  super.onResume(); webView.onResume(); wakeC();}
              @Override protected void onDestroy(){
                  handler.removeCallbacksAndMessages(null);
                  if(speechRecognizer!=null)speechRecognizer.destroy();
                  webView.destroy(); super.onDestroy();}
          }
