          cat > src/com/allinone/app/HomeActivity.java << 'JEOF'
          package com.allinone.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.os.AsyncTask;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class HomeActivity extends Activity {
              static final String PREF="aio_prefs", KEY_URL="custom_url", KEY_HIST="url_history",
                  KEY_INIT="inited81", DEF="https://www.rophimm.me", SEP="|||";
              static final String[] DEFS={
                  "https://www.rophimm.me",
                  "https://vtvgo.vn",
                  "https://www.netflix.com",
                  "https://www.youtube.com",
                  "https://fptplay.vn",
                  "https://www.google.com",
                  "https://vnexpress.net",
                  "https://tinnhac.com"
              };
              private static final int COLS=3;
              private LinearLayout grid;
              private android.widget.ScrollView scrollView;
              private TextView btnSettings;
              private SharedPreferences prefs;
              private Handler handler = new Handler();
              private List<LinearLayout> cards = new ArrayList<LinearLayout>();
              private List<String> urls = new ArrayList<String>();
              private int selIdx = 0;

              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s); setContentView(R.layout.home);
                  prefs = getSharedPreferences(PREF, Context.MODE_PRIVATE);
                  if (!prefs.getBoolean(KEY_INIT, false)) {
                      StringBuilder sb = new StringBuilder();
                      for (int i=0;i<DEFS.length;i++){if(i>0)sb.append(SEP);sb.append(DEFS[i]);}
                      prefs.edit().putString(KEY_HIST,sb.toString()).putString(KEY_URL,DEF).putBoolean(KEY_INIT,true).apply();
                  }
                  grid = (LinearLayout)findViewById(R.id.gridLinks);
                  scrollView = (android.widget.ScrollView)findViewById(R.id.scrollView);
                  btnSettings = (TextView)findViewById(R.id.btnSettings);
                  btnSettings.setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){startActivity(new Intent(HomeActivity.this,SettingsActivity.class));}});
              }

              @Override protected void onResume() { super.onResume(); render(); }

              private List<String> hist() {
                  return new ArrayList<String>(Arrays.asList(prefs.getString(KEY_HIST,DEF).split("\\|\\|\\|")));
              }

              private void render() {
                  grid.removeAllViews(); cards.clear(); urls.clear();
                  List<String> h = hist(); String act = prefs.getString(KEY_URL, DEF);
                  LinearLayout row = null;
                  for (int i=0; i<h.size(); i++) {
                      if (i%COLS==0) {
                          row = new LinearLayout(this); row.setOrientation(LinearLayout.HORIZONTAL);
                          LinearLayout.LayoutParams rp = new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                          rp.setMargins(0,0,0,16); row.setLayoutParams(rp); row.setFocusable(false); grid.addView(row);
                      }
                      final String url = h.get(i); urls.add(url);
                      final LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL); card.setGravity(android.view.Gravity.CENTER);
                      card.setPadding(16,20,16,20); card.setFocusable(false); card.setClickable(true);
                      card.setBackgroundColor(url.equals(act) ? 0xff1f1f40 : 0xff141428);
                      LinearLayout.LayoutParams cp = new LinearLayout.LayoutParams(0, 180, 1f);
                      cp.setMargins(0,0,12,0); card.setLayoutParams(cp);
                      ImageView fav = new ImageView(this);
                      fav.setLayoutParams(new LinearLayout.LayoutParams(60,60));
                      fav.setScaleType(ImageView.ScaleType.FIT_CENTER); card.addView(fav);
                      final int fi=i; final ImageView fv=fav;
                      handler.postDelayed(new Runnable(){@Override public void run(){
                          new AsyncTask<String,Void,Bitmap>(){
                              @Override protected Bitmap doInBackground(String...u){
                                  try{HttpURLConnection c=(HttpURLConnection)new URL(u[0]).openConnection();
                                  c.setConnectTimeout(4000);c.setReadTimeout(4000);c.setInstanceFollowRedirects(true);
                                  return BitmapFactory.decodeStream(c.getInputStream());}catch(Exception e){return null;}}
                              @Override protected void onPostExecute(Bitmap b){if(b!=null)fv.setImageBitmap(b);}
                          }.execute("https://www.google.com/s2/favicons?domain="+url+"&sz=64");
                      }}, fi*150L);
                      TextView lbl = new TextView(this);
                      lbl.setText(url.replace("https://","").replace("http://","").split("/")[0]);
                      lbl.setTextColor(url.equals(act) ? 0xffE50914 : 0xffaaaaaa);
                      lbl.setTextSize(12); lbl.setGravity(android.view.Gravity.CENTER); lbl.setMaxLines(1); lbl.setFocusable(false);
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      lp.setMargins(0,6,0,0); lbl.setLayoutParams(lp); card.addView(lbl);
                      final int fii=fi;
                      card.setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){open(urls.get(fii));}});
                      cards.add(card); row.addView(card);
                  }
                  if (row!=null && h.size()%COLS!=0) {
                      for (int j=0;j<COLS-(h.size()%COLS);j++){
                          View e=new View(this); LinearLayout.LayoutParams ep=new LinearLayout.LayoutParams(0,180,1f);
                          ep.setMargins(0,0,12,0); e.setLayoutParams(ep); row.addView(e);
                      }
                  }
                  if (!cards.isEmpty()) hilite(0, true);
              }

              private void open(String url) {
                  prefs.edit().putString(KEY_URL,url).apply();
                  startActivity(new Intent(this,MainActivity.class).putExtra("url",url));
              }

              private void hilite(int idx, boolean on) {
                  if (idx<0||idx>=cards.size()) return;
                  cards.get(idx).setBackgroundColor(on ? 0xff2a1020 : (urls.get(idx).equals(prefs.getString(KEY_URL,DEF)) ? 0xff1f1f40 : 0xff141428));
              }

              @Override public boolean onKeyDown(int key, KeyEvent e) {
                  int tot = cards.size();
                  switch(key) {
                      case KeyEvent.KEYCODE_DPAD_UP:
                          if(selIdx-COLS>=0){hilite(selIdx,false);selIdx-=COLS;hilite(selIdx,true);}return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:
                          if(selIdx+COLS<tot){hilite(selIdx,false);selIdx+=COLS;hilite(selIdx,true);}return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:
                          if(selIdx-1>=0){hilite(selIdx,false);selIdx--;hilite(selIdx,true);}return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:
                          if(selIdx+1<tot){hilite(selIdx,false);selIdx++;hilite(selIdx,true);}return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER: case KeyEvent.KEYCODE_ENTER:
                          if(e.getRepeatCount()==0&&!urls.isEmpty())open(urls.get(selIdx));return true;
                      case KeyEvent.KEYCODE_MENU:
                          startActivity(new Intent(this,SettingsActivity.class));return true;
                      case KeyEvent.KEYCODE_BACK: finish();return true;
                  }
                  return super.onKeyDown(key, e);
              }
          }
