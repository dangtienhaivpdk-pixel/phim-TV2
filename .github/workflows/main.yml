                  int[]l=new int[2];webView.getLocationOnScreen(l);
                  float rx=sx-l[0],ry=sy-l[1];long t=SystemClock.uptimeMillis();
                  MotionEvent.PointerProperties[]pp=new MotionEvent.PointerProperties[1];
                  pp[0]=new MotionEvent.PointerProperties();pp[0].id=0;pp[0].toolType=MotionEvent.TOOL_TYPE_MOUSE;
                  MotionEvent.PointerCoords[]pc=new MotionEvent.PointerCoords[1];
                  pc[0]=new MotionEvent.PointerCoords();pc[0].x=rx;pc[0].y=ry;
                  pc[0].setAxisValue(MotionEvent.AXIS_VSCROLL,dy>0?-4f:4f);
                  MotionEvent ev=MotionEvent.obtain(t,t,MotionEvent.ACTION_SCROLL,1,pp,pc,
                      0,0,1f,1f,0,0,InputDevice.SOURCE_MOUSE,0);
                  webView.dispatchGenericMotionEvent(ev);ev.recycle();
