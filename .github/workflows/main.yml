              private View hitTest(View v,float tx,float ty){
                  if(v==null||v.getVisibility()!=View.VISIBLE)return null;
                  int[]loc=new int[2];v.getLocationOnScreen(loc);
                  int l=loc[0],t=loc[1],r=l+v.getWidth(),b=t+v.getHeight();
                  if(tx<l||tx>r||ty<t||ty>b)return null;
                  if(v instanceof ViewGroup){
                      ViewGroup vg=(ViewGroup)v;
                      for(int i=vg.getChildCount()-1;i>=0;i--){
                          View found=hitTest(vg.getChildAt(i),tx,ty);
                          if(found!=null)return found;
                      }
                  }
                  if(v.isClickable()&&!(v instanceof CursorView))return v;
                  return null;
