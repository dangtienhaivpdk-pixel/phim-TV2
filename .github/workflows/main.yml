      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml -S res -J build/gen -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/allinone/app/R.java \
            src/com/allinone/app/CursorView.java \
            src/com/allinone/app/ScrollWebView.java \
            src/com/allinone/app/HomeActivity.java \
            src/com/allinone/app/SettingsActivity.java \
            src/com/allinone/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx --dex --output=build/classes.dex build/classes
          cp build/resources.ap_ build/allinone.apk
          cd build && zip -u allinone.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/allinone.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=AllInOne,O=AllInOne,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out ALLINONE.apk build/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALLINONE
          path: ALLINONE.apk
          retention-days: 30
