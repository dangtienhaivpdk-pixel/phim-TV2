          cat > src/com/allinone/app/HomeActivity.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.graphics.Rect;
          import android.os.AsyncTask;
          import android.os.Bundle;
          import android.os.Handler;
          import android.app.Activity;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class HomeActivity extends Activity {
              static final String PREF="aio_prefs",KEY_URL="custom_url",KEY_HIST="url_history",
                  KEY_INIT="inited",DEF="https://pointnorth.io",SEP="|||";
              static final String[]DEFS={"https://pointnorth.io","https://www.youtube.com",
                  "https://www.google.com","https://tv360.vn/tv/vtv1-hd?ch=2&c=0",
                  "https://tinnhac.com","https://vnexpress.net"};
              private static final int COLS=3;
              private static final int CLR_CARD_NORM=0xff141428,CLR_CARD_ACTIVE=0xff1f1f40;
              private static final int CLR_CARD_FOCUS=0xff2a1020,CLR_BORDER_FOCUS=0xffE50914;
              private static final int CLR_BORDER_NONE=0x00000000;
              private static final int CLR_BTN_NORM=0xff333355,CLR_BTN_FOCUS=0xffE50914;
              private LinearLayout grid;
              private ScrollView scrollView;
              private TextView btnSettings;
              private SharedPreferences prefs;
              private Handler handler=new Handler();
              private List<LinearLayout> cardWrappers=new ArrayList<LinearLayout>();
              private List<String> urls=new ArrayList<String>();
              private int zone=1,gridIdx=0;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);setContentView(R.layout.home);
                  getWindow().getDecorView().setFocusable(false);
                  getWindow().getDecorView().setFocusableInTouchMode(false);
                  prefs=getSharedPreferences(PREF,Context.MODE_PRIVATE);
                  if(!prefs.getBoolean(KEY_INIT,false)){
                      StringBuilder sb=new StringBuilder();
                      for(int i=0;i<DEFS.length;i++){if(i>0)sb.append(SEP);sb.append(DEFS[i]);}
                      prefs.edit().putString(KEY_HIST,sb.toString()).putString(KEY_URL,DEF)
                          .putBoolean(KEY_INIT,true).apply();
                  }
                  grid=(LinearLayout)findViewById(R.id.gridLinks);
                  scrollView=(ScrollView)findViewById(R.id.scrollView);
                  btnSettings=(TextView)findViewById(R.id.btnSettings);
                  btnSettings.setBackgroundColor(CLR_BTN_NORM);
                  btnSettings.setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){
                          startActivity(new Intent(HomeActivity.this,SettingsActivity.class));}});
              }
              @Override protected void onResume(){super.onResume();renderLinks();}
              private List<String> hist(){
                  return new ArrayList<String>(Arrays.asList(prefs.getString(KEY_HIST,DEF).split("\\|\\|\\|")));
              }
              private void renderLinks(){
                  grid.removeAllViews();cardWrappers.clear();urls.clear();
                  zone=1;gridIdx=0;
                  btnSettings.setBackgroundColor(CLR_BTN_NORM);
                  List<String>h=hist();String act=prefs.getString(KEY_URL,DEF);
                  LinearLayout row=null;
                  for(int i=0;i<h.size();i++){
                      if(i%COLS==0){
                          row=new LinearLayout(this);
                          row.setOrientation(LinearLayout.HORIZONTAL);row.setFocusable(false);
                          LinearLayout.LayoutParams rp=new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.MATCH_PARENT,ViewGroup.LayoutParams.WRAP_CONTENT);
                          rp.setMargins(0,0,0,20);row.setLayoutParams(rp);grid.addView(row);
                      }
                      final String url=h.get(i);urls.add(url);
                      final LinearLayout wrap=new LinearLayout(this);
                      wrap.setOrientation(LinearLayout.VERTICAL);wrap.setFocusable(false);
                      LinearLayout.LayoutParams wp=new LinearLayout.LayoutParams(0,ViewGroup.LayoutParams.WRAP_CONTENT,1f);
                      wp.setMargins(0,0,16,0);wrap.setLayoutParams(wp);
                      wrap.setBackgroundColor(CLR_BORDER_NONE);wrap.setPadding(3,3,3,3);
                      final LinearLayout card=new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setGravity(android.view.Gravity.CENTER);
                      card.setPadding(18,22,18,22);
                      card.setLayoutParams(new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT,196));
                      card.setBackgroundColor(url.equals(act)?CLR_CARD_ACTIVE:CLR_CARD_NORM);
                      card.setFocusable(false);card.setClickable(true);
                      if(android.os.Build.VERSION.SDK_INT>=21)card.setStateListAnimator(null);
                      ImageView fav=new ImageView(this);
                      fav.setLayoutParams(new LinearLayout.LayoutParams(68,68));
                      fav.setScaleType(ImageView.ScaleType.FIT_CENTER);
                      fav.setFocusable(false);card.addView(fav);
                      final int fi=i;final ImageView fv=fav;
                      handler.postDelayed(new Runnable(){@Override public void run(){
                          new AsyncTask<String,Void,Bitmap>(){
                              @Override protected Bitmap doInBackground(String...u){
                                  try{HttpURLConnection c=(HttpURLConnection)new URL(u[0]).openConnection();
                                  c.setConnectTimeout(4000);c.setReadTimeout(4000);c.setInstanceFollowRedirects(true);
                                  return BitmapFactory.decodeStream(c.getInputStream());}catch(Exception e){return null;}}
                              @Override protected void onPostExecute(Bitmap b){if(b!=null)fv.setImageBitmap(b);}
                          }.execute("https://www.google.com/s2/favicons?domain="+url+"&sz=64");
                      }},fi*180L);
                      TextView lbl=new TextView(this);
                      lbl.setText(url.replace("https://","").replace("http://","").split("/")[0]);
                      lbl.setTextColor(url.equals(act)?CLR_BORDER_FOCUS:0xffaaaaaa);
                      lbl.setTextSize(13);lbl.setGravity(android.view.Gravity.CENTER);
                      lbl.setMaxLines(1);lbl.setFocusable(false);
                      LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,ViewGroup.LayoutParams.WRAP_CONTENT);
                      lp.setMargins(0,8,0,0);lbl.setLayoutParams(lp);card.addView(lbl);
                      if(url.equals(act)){
                          TextView t=new TextView(this);t.setText("\u25b6 Đang xem");
                          t.setTextColor(CLR_BORDER_FOCUS);t.setTextSize(11);
                          t.setGravity(android.view.Gravity.CENTER);t.setFocusable(false);card.addView(t);
                      }
                      final int fii=fi;
                      card.setOnClickListener(new View.OnClickListener(){
                          @Override public void onClick(View v){openUrl(urls.get(fii));}});
                      wrap.addView(card);cardWrappers.add(wrap);row.addView(wrap);
                  }
                  if(row!=null&&h.size()%COLS!=0){
                      for(int j=0;j<COLS-(h.size()%COLS);j++){
                          View e=new View(this);e.setFocusable(false);
                          LinearLayout.LayoutParams ep=new LinearLayout.LayoutParams(0,196,1f);
                          ep.setMargins(0,0,16,0);e.setLayoutParams(ep);row.addView(e);
                      }
                  }
                  if(!cardWrappers.isEmpty())highlightCard(0,true);
              }
              private void openUrl(String url){
                  prefs.edit().putString(KEY_URL,url).apply();
                  startActivity(new Intent(HomeActivity.this,MainActivity.class).putExtra("url",url));
              }
              private void highlightCard(int idx,boolean on){
                  if(idx<0||idx>=cardWrappers.size())return;
                  LinearLayout wrap=cardWrappers.get(idx);
                  String url=urls.get(idx);String act=prefs.getString(KEY_URL,DEF);
                  if(on){
                      wrap.setBackgroundColor(CLR_BORDER_FOCUS);wrap.setPadding(4,4,4,4);
                      if(wrap.getChildCount()>0)wrap.getChildAt(0).setBackgroundColor(CLR_CARD_FOCUS);
                  }else{
                      wrap.setBackgroundColor(CLR_BORDER_NONE);wrap.setPadding(3,3,3,3);
                      if(wrap.getChildCount()>0)
