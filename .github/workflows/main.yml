                          List<String> list=getHist(); list.remove(url);
                          StringBuilder sb=new StringBuilder();
                          for(int i=0;i<list.size();i++){if(i>0)sb.append(SEP);sb.append(list.get(i));}
                          prefs.edit().putString(KEY_HIST,sb.toString()).apply(); renderHist();}});
                      row.setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){saveUrl(url);openUrl(url);}});
                      row.addView(bu); row.addView(bd); listUrls.addView(row);
                  }
              }

              @Override public boolean onKeyDown(int key, KeyEvent e) {
                  if(key==KeyEvent.KEYCODE_BACK){finish();return true;}
                  return super.onKeyDown(key,e);
              }
