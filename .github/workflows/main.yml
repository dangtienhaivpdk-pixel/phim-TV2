          package com.allinone.app;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.util.AttributeSet;
          import android.view.View;
          public class CursorView extends View {
              private final Paint wFill,bStroke,rDot;
              private float cx=-1,cy=-1;
              public CursorView(Context c){super(c);wFill=pw();bStroke=ps();rDot=pd();}
              public CursorView(Context c,AttributeSet a){super(c,a);wFill=pw();bStroke=ps();rDot=pd();}
              private Paint pw(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFFFFFFF);p.setStyle(Paint.Style.FILL);return p;}
              private Paint ps(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFF000000);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(2.5f);p.setStrokeJoin(Paint.Join.ROUND);return p;}
              private Paint pd(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFE50914);p.setStyle(Paint.Style.FILL);return p;}
              public void setPos(float x,float y){cx=x;cy=y;invalidate();}
              public float getCX(){return cx;} public float getCY(){return cy;}
              @Override protected void onDraw(Canvas c){
                  if(cx<0||cy<0)return;
                  Path p=new Path();
                  p.moveTo(cx,cy);p.lineTo(cx,cy+22);p.lineTo(cx+6,cy+16);
                  p.lineTo(cx+13,cy+27);p.lineTo(cx+16,cy+25);
                  p.lineTo(cx+9,cy+14);p.lineTo(cx+17,cy+14);p.close();
                  c.drawPath(p,bStroke);c.drawPath(p,wFill);
                  c.drawCircle(cx,cy,3.5f,rDot);
              }
          }
          JEOF

          cat > src/com/allinone/app/ScrollWebView.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.util.AttributeSet;
          import android.webkit.WebView;
          public class ScrollWebView extends WebView {
              public interface ScrollCb{void onUp();void onDown();}
              private ScrollCb cb;
              public ScrollWebView(Context c){super(c);}
              public ScrollWebView(Context c,AttributeSet a){super(c,a);}
              public void setScrollCb(ScrollCb c){cb=c;}
              @Override protected void onScrollChanged(int l,int t,int ol,int ot){
                  super.onScrollChanged(l,t,ol,ot);
                  if(cb!=null){if(t<ot)cb.onUp();else if(t>ot)cb.onDown();}
              }
          }
          JEOF

          cat > src/com/allinone/app/BaseActivity.java << 'JEOF'
          package com.allinone.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.util.DisplayMetrics;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          public abstract class BaseActivity extends Activity {
              protected CursorView cursorView;
              protected float screenW=1280,screenH=720;
              public static float CX=-1,CY=-1;
              protected static final float STEP=22f,STEP_FAST=70f;
              private View lastHovered=null;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);
                  DisplayMetrics dm=new DisplayMetrics();
                  getWindowManager().getDefaultDisplay().getMetrics(dm);
                  screenW=dm.widthPixels;screenH=dm.heightPixels;
              }
              protected void initCursor(){
                  cursorView=(CursorView)findViewById(R.id.cursor);
                  if(cursorView==null)return;
                  if(CX<0){CX=screenW/2f;CY=screenH/2f;}
                  cursorView.setPos(CX,CY);
              }
              protected void moveCursor(float dx,float dy){
                  if(cursorView==null)return;
                  CX=Math.max(0,Math.min(screenW-2,CX+dx));
                  CY=Math.max(0,Math.min(screenH-2,CY+dy));
                  cursorView.setPos(CX,CY);
                  doHover(CX,CY);
                  onCursorMoved(CX,CY);
              }
              protected void onCursorMoved(float x,float y){}
              private void doHover(float x,float y){
                  View root=getWindow().getDecorView();
                  View hit=findClickable(root,(int)x,(int)y);
                  if(lastHovered!=null&&lastHovered!=hit){lastHovered.setPressed(false);lastHovered=null;}
                  if(hit!=null){hit.setPressed(true);lastHovered=hit;}
              }
              protected boolean clickAt(float x,float y){
                  View root=getWindow().getDecorView();
                  View hit=findClickable(root,(int)x,(int)y);
                  if(hit!=null){hit.setPressed(false);hit.performClick();return true;}
                  return false;
              }
              protected View findClickable(View v,int x,int y){
                  if(v.getVisibility()!=View.VISIBLE)return null;
                  if(!hitTest(v,x,y))return null;
                  if(v instanceof ViewGroup){
                      ViewGroup vg=(ViewGroup)v;
                      for(int i=vg.getChildCount()-1;i>=0;i--){
                          View r=findClickable(vg.getChildAt(i),x,y);
                          if(r!=null)return r;
                      }
                  }
                  if(v.isClickable())return v;
                  return null;
              }
              protected boolean hitTest(View v,int x,int y){
                  int[]loc=new int[2];v.getLocationOnScreen(loc);
                  return x>=loc[0]&&x<loc[0]+v.getWidth()&&y>=loc[1]&&y<loc[1]+v.getHeight();
              }
              @Override public boolean onKeyDown(int key,KeyEvent e){
                  float step=e.getRepeatCount()>5?STEP_FAST:STEP;
                  switch(key){
                      case KeyEvent.KEYCODE_DPAD_UP:    moveCursor(0,-step);return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:  moveCursor(0, step);return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:  moveCursor(-step,0);return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT: moveCursor( step,0);return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                      case KeyEvent.KEYCODE_ENTER:
                          if(!clickAt(CX,CY))onEnterFallback();return true;
                      case KeyEvent.KEYCODE_BACK:       return onBackAction();
                  }
                  return super.onKeyDown(key,e);
              }
              protected void onEnterFallback(){}
              protected boolean onBackAction(){finish();return true;}
          }
          JEOF

          cat > src/com/allinone/app/HomeActivity.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.os.AsyncTask;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class HomeActivity extends BaseActivity {
              static final String PREF="aio_prefs",KEY_URL="custom_url",KEY_HIST="url_history",
                  KEY_INIT="inited",DEF="https://pointnorth.io",SEP="|||";
              static final String[]DEFS={"https://pointnorth.io","https://www.youtube.com",
                  "https://www.google.com","https://vtvgo.vn","https://tinnhac.com","https://vnexpress.net"};
              private LinearLayout grid;
              private SharedPreferences prefs;
              private Handler handler=new Handler();
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);setContentView(R.layout.home);initCursor();
                  prefs=getSharedPreferences(PREF,Context.MODE_PRIVATE);
                  if(!prefs.getBoolean(KEY_INIT,false)){
                      StringBuilder sb=new StringBuilder();
                      for(int i=0;i<DEFS.length;i++){if(i>0)sb.append(SEP);sb.append(DEFS[i]);}
                      prefs.edit().putString(KEY_HIST,sb.toString()).putString(KEY_URL,DEF).putBoolean(KEY_INIT,true).apply();
                  }
                  grid=(LinearLayout)findViewById(R.id.gridLinks);
                  ((Button)findViewById(R.id.btnSettings)).setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){startActivity(new Intent(HomeActivity.this,SettingsActivity.class));}
                  });
              }
              @Override protected void onResume(){super.onResume();renderLinks();}
              private List<String> hist(){return new ArrayList<String>(Arrays.asList(prefs.getString(KEY_HIST,DEF).split("\\|\\|\\|")));}
              private void renderLinks(){
                  grid.removeAllViews();List<String>h=hist();String act=prefs.getString(KEY_URL,DEF);
                  int cols=3;LinearLayout row=null;
                  for(int i=0;i<h.size();i++){
                      if(i%cols==0){row=new LinearLayout(this);row.setOrientation(LinearLayout.HORIZONTAL);
                          LinearLayout.LayoutParams rp=new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT,ViewGroup.LayoutParams.WRAP_CONTENT);
                          rp.setMargins(0,0,0,20);row.setLayoutParams(rp);grid.addView(row);}
                      final String url=h.get(i);
                      final LinearLayout card=new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);card.setGravity(android.view.Gravity.CENTER);
                      card.setPadding(20,24,20,24);card.setBackgroundColor(url.equals(act)?0xff1a1a3e:0xff1a1a2e);
                      LinearLayout.LayoutParams cp=new LinearLayout.LayoutParams(0,200,1f);cp.setMargins(0,0,16,0);card.setLayoutParams(cp);
                      card.setFocusable(false);card.setClickable(true);
                      ImageView fav=new ImageView(this);fav.setLayoutParams(new LinearLayout.LayoutParams(72,72));
                      fav.setScaleType(ImageView.ScaleType.FIT_CENTER);card.addView(fav);
                      final int idx=i;final ImageView fv=fav;
                      handler.postDelayed(new Runnable(){@Override public void run(){
                          new AsyncTask<String,Void,Bitmap>(){
                              @Override protected Bitmap doInBackground(String...u){
                                  try{HttpURLConnection c=(HttpURLConnection)new URL(u[0]).openConnection();
                                  c.setConnectTimeout(4000);c.setReadTimeout(4000);c.setInstanceFollowRedirects(true);
                                  return BitmapFactory.decodeStream(c.getInputStream());}catch(Exception e){return null;}}
                              @Override protected void onPostExecute(Bitmap b){if(b!=null&&fv!=null)fv.setImageBitmap(b);}
