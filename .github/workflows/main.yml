                  getWindowManager().getDefaultDisplay().getMetrics(dm);
                  scW=dm.widthPixels;scH=dm.heightPixels;
                  float ix=savedCX>0?savedCX:scW/2f,iy=savedCY>0?savedCY:scH/2f;
                  cursor.setPos(ix,iy);savedCX=ix;savedCY=iy;
                  handler.postDelayed(hideCursorRun,HIDE_DELAY);
                  findViewById(R.id.btnBack).setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){finish();}});
                  findViewById(R.id.btnAddUrl).setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){openDialog(null);}});
                  findViewById(R.id.btnReset).setOnClickListener(new View.OnClickListener(){
                      @Override public void onClick(View v){doReset();}});
