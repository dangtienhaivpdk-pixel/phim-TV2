          cat > src/com/allinone/app/ScrollWebView.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.content.Context;
          import android.util.AttributeSet;
          import android.webkit.WebView;
          public class ScrollWebView extends WebView {
              public interface OnScrollChangedCallback {
                  void onScrollUp();
                  void onScrollDown();
              }
              private OnScrollChangedCallback callback;
              public ScrollWebView(Context c) { super(c); }
              public ScrollWebView(Context c, AttributeSet a) { super(c, a); }
              public void setOnScrollChangedCallback(OnScrollChangedCallback cb) { this.callback = cb; }
              @Override
              protected void onScrollChanged(int l, int t, int oldl, int oldt) {
                  super.onScrollChanged(l, t, oldl, oldt);
                  if (callback != null) {
                      if (t < oldt) callback.onScrollUp();
                      else if (t > oldt) callback.onScrollDown();
                  }
              }
          }
          ENDOFFILE

          cat > src/com/allinone/app/HomeActivity.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.graphics.Color;
          import android.os.AsyncTask;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.ImageView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.io.InputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class HomeActivity extends Activity {
              private static final String PREF_NAME = "aio_prefs";
              private static final String KEY_URL = "custom_url";
              private static final String KEY_HISTORY = "url_history";
              private static final String KEY_INITED = "inited";
              private static final String DEFAULT_URL = "https://pointnorth.io";
              private static final String SEP = "|||";
              private static final String[] DEFAULT_URLS = {
                  "https://pointnorth.io",
                  "https://www.youtube.com",
                  "https://www.google.com",
                  "https://vtvgo.vn",
                  "https://tinnhac.com",
                  "https://vnexpress.net"
              };
              private LinearLayout gridLinks;
              private SharedPreferences prefs;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.home);
                  prefs = getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                  initDefaultUrls();
                  gridLinks = (LinearLayout) findViewById(R.id.gridLinks);
                  ((Button) findViewById(R.id.btnSettings)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          startActivity(new Intent(HomeActivity.this, SettingsActivity.class));
                      }
                  });
              }
              @Override protected void onResume() { super.onResume(); renderLinks(); }
              private void initDefaultUrls() {
                  if (!prefs.getBoolean(KEY_INITED, false)) {
                      StringBuilder sb = new StringBuilder();
                      for (int i = 0; i < DEFAULT_URLS.length; i++) {
                          if (i > 0) sb.append(SEP);
                          sb.append(DEFAULT_URLS[i]);
                      }
                      prefs.edit()
                          .putString(KEY_HISTORY, sb.toString())
                          .putString(KEY_URL, DEFAULT_URL)
                          .putBoolean(KEY_INITED, true)
                          .apply();
                  }
              }
              public List<String> getHistory() {
                  String raw = prefs.getString(KEY_HISTORY, DEFAULT_URL);
                  return new ArrayList<String>(Arrays.asList(raw.split("\\|\\|\\|")));
              }
              private void renderLinks() {
                  gridLinks.removeAllViews();
                  List<String> history = getHistory();
                  String activeUrl = prefs.getString(KEY_URL, DEFAULT_URL);
                  int cols = 3;
                  LinearLayout row = null;
                  for (int i = 0; i < history.size(); i++) {
                      if (i % cols == 0) {
                          row = new LinearLayout(this);
                          row.setOrientation(LinearLayout.HORIZONTAL);
                          LinearLayout.LayoutParams rp = new LinearLayout.LayoutParams(
                              ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                          rp.setMargins(0,0,0,20); row.setLayoutParams(rp);
                          gridLinks.addView(row);
                      }
                      final String url = history.get(i);
                      LinearLayout card = new LinearLayout(this);
                      card.setOrientation(LinearLayout.VERTICAL);
                      card.setGravity(android.view.Gravity.CENTER);
                      card.setPadding(20,24,20,24);
                      card.setBackgroundColor(url.equals(activeUrl) ? 0xff1a1a3e : 0xff1a1a2e);
                      LinearLayout.LayoutParams cp = new LinearLayout.LayoutParams(0, 200, 1f);
                      cp.setMargins(0,0,16,0); card.setLayoutParams(cp);
                      card.setFocusable(true); card.setClickable(true);
                      ImageView favicon = new ImageView(this);
                      favicon.setLayoutParams(new LinearLayout.LayoutParams(72,72));
                      favicon.setScaleType(ImageView.ScaleType.FIT_CENTER);
                      card.addView(favicon);
                      new LoadFaviconTask(favicon).execute(
                          "https://www.google.com/s2/favicons?domain=" + url + "&sz=64");
                      TextView label = new TextView(this);
                      String domain = url.replace("https://","").replace("http://","").split("/")[0];
                      label.setText(domain);
                      label.setTextColor(url.equals(activeUrl) ? 0xffE50914 : 0xffcccccc);
                      label.setTextSize(13); label.setGravity(android.view.Gravity.CENTER);
                      label.setMaxLines(1);
                      LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      lp.setMargins(0,10,0,0); label.setLayoutParams(lp);
                      card.addView(label);
                      if (url.equals(activeUrl)) {
                          TextView active = new TextView(this);
                          active.setText("▶ Dang xem");
                          active.setTextColor(0xffE50914); active.setTextSize(11);
                          active.setGravity(android.view.Gravity.CENTER);
                          card.addView(active);
                      }
                      card.setOnClickListener(new View.OnClickListener() {
                          @Override public void onClick(View v) { openUrl(url); }
                      });
                      card.setOnFocusChangeListener(new View.OnFocusChangeListener() {
                          @Override public void onFocusChange(View v, boolean focused) {
                              v.setBackgroundColor(focused ? 0xff2a2a5e :
                                  (url.equals(prefs.getString(KEY_URL, DEFAULT_URL)) ? 0xff1a1a3e : 0xff1a1a2e));
                          }
                      });
                      row.addView(card);
                  }
                  if (row != null && history.size() % cols != 0) {
                      int rem = cols - (history.size() % cols);
                      for (int j = 0; j < rem; j++) {
                          View empty = new View(this);
                          LinearLayout.LayoutParams ep = new LinearLayout.LayoutParams(0, 200, 1f);
                          ep.setMargins(0,0,16,0); empty.setLayoutParams(ep); row.addView(empty);
                      }
                  }
              }
              private void openUrl(String url) {
                  prefs.edit().putString(KEY_URL, url).apply();
                  Intent i = new Intent(this, MainActivity.class);
                  i.putExtra("url", url); startActivity(i);
              }
              private static class LoadFaviconTask extends AsyncTask<String, Void, Bitmap> {
                  private ImageView imageView;
                  LoadFaviconTask(ImageView iv) { this.imageView = iv; }
                  @Override protected Bitmap doInBackground(String... urls) {
                      try {
                          HttpURLConnection conn = (HttpURLConnection) new URL(urls[0]).openConnection();
                          conn.setConnectTimeout(5000); conn.setReadTimeout(5000);
                          conn.setInstanceFollowRedirects(true);
                          return BitmapFactory.decodeStream(conn.getInputStream());
                      } catch (Exception e) { return null; }
                  }
                  @Override protected void onPostExecute(Bitmap bmp) {
                      if (bmp != null && imageView != null) imageView.setImageBitmap(bmp);
                  }
              }
              @Override public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK) { finish(); return true; }
                  return super.onKeyDown(keyCode, event);
              }
          }
          ENDOFFILE

          cat > src/com/allinone/app/SettingsActivity.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class SettingsActivity extends Activity {
              private static final String PREF_NAME = "aio_prefs";
              private static final String KEY_URL = "custom_url";
              private static final String KEY_HISTORY = "url_history";
              private static final String DEFAULT_URL = "https://pointnorth.io";
              private static final String SEP = "|||";
              private EditText editUrl;
              private LinearLayout listUrls;
              private SharedPreferences prefs;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.settings);
                  prefs = getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                  editUrl = (EditText) findViewById(R.id.editUrl);
                  listUrls = (LinearLayout) findViewById(R.id.listUrls);
                  editUrl.setText(prefs.getString(KEY_URL, DEFAULT_URL));
                  renderHistory();
                  ((Button) findViewById(R.id.btnBack)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { finish(); }
                  });
                  ((Button) findViewById(R.id.btnSave)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          String newUrl = editUrl.getText().toString().trim();
                          if (newUrl.isEmpty()) return;
                          if (!newUrl.startsWith("http")) newUrl = "https://" + newUrl;
                          saveUrl(newUrl); openUrl(newUrl);
                      }
                  });
                  ((Button) findViewById(R.id.btnReset)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { saveUrl(DEFAULT_URL); openUrl(DEFAULT_URL); }
                  });
              }
              private List<String> getHistory() {
                  String raw = prefs.getString(KEY_HISTORY, DEFAULT_URL);
                  return new ArrayList<String>(Arrays.asList(raw.split("\\|\\|\\|")));
              }
              private void addToHistory(String url) {
                  List<String> list = getHistory();
                  list.remove(url); list.add(0, url);
                  if (list.size() > 30) list = list.subList(0, 30);
                  StringBuilder sb = new StringBuilder();
                  for (int i=0; i<list.size(); i++) { if (i>0) sb.append(SEP); sb.append(list.get(i)); }
                  prefs.edit().putString(KEY_HISTORY, sb.toString()).apply();
              }
              private void saveUrl(String url) {
                  prefs.edit().putString(KEY_URL, url).apply();
                  addToHistory(url); renderHistory();
              }
              private void openUrl(String url) {
                  Intent i = new Intent(this, MainActivity.class);
                  i.putExtra("url", url);
                  i.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  startActivity(i); finish();
              }
              private void renderHistory() {
                  listUrls.removeAllViews();
                  List<String> history = getHistory();
                  String activeUrl = prefs.getString(KEY_URL, DEFAULT_URL);
                  for (final String url : history) {
                      LinearLayout row = new LinearLayout(this);
                      row.setOrientation(LinearLayout.HORIZONTAL);
                      row.setPadding(16,12,16,12);
                      row.setBackgroundColor(url.equals(activeUrl) ? 0xff1a1a2e : 0xff111111);
                      LinearLayout.LayoutParams rp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      rp.setMargins(0,0,0,8); row.setLayoutParams(rp);
                      TextView txtUrl = new TextView(this);
                      txtUrl.setText((url.equals(activeUrl) ? "▶  " : "      ") + url);
                      txtUrl.setTextColor(url.equals(activeUrl) ? 0xffE50914 : 0xffcccccc);
                      txtUrl.setTextSize(16);
                      txtUrl.setLayoutParams(new LinearLayout.LayoutParams(
                          0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f));
                      row.addView(txtUrl);
                      Button btnUse = new Button(this);
                      btnUse.setText("Chon"); btnUse.setTextColor(Color.WHITE);
                      btnUse.setBackgroundColor(0xff333355); btnUse.setTextSize(13); btnUse.setPadding(16,8,16,8);
                      btnUse.setLayoutParams(new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT));
                      btnUse.setOnClickListener(new View.OnClickListener() {
                          @Override public void onClick(View v) { saveUrl(url); openUrl(url); }
                      });
                      Button btnDel = new Button(this);
                      btnDel.setText("X"); btnDel.setTextColor(Color.WHITE);
                      btnDel.setBackgroundColor(0xff660000); btnDel.setTextSize(13); btnDel.setPadding(16,8,16,8);
                      LinearLayout.LayoutParams dp = new LinearLayout.LayoutParams(
                          ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      dp.setMargins(8,0,0,0); btnDel.setLayoutParams(dp);
                      btnDel.setOnClickListener(new View.OnClickListener() {
                          @Override public void onClick(View v) {
                              List<String> list = getHistory(); list.remove(url);
                              StringBuilder sb = new StringBuilder();
                              for (int i=0; i<list.size(); i++) { if (i>0) sb.append(SEP); sb.append(list.get(i)); }
                              prefs.edit().putString(KEY_HISTORY, sb.toString()).apply();
                              renderHistory();
                          }
                      });
                      row.addView(btnUse); row.addView(btnDel);
                      listUrls.addView(row);
                  }
              }
              @Override public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK) { finish(); return true; }
                  return super.onKeyDown(keyCode, event);
              }
          }
          ENDOFFILE

          cat > src/com/allinone/app/MainActivity.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.os.Handler;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import android.net.http.SslError;
          import android.webkit.SslErrorHandler;
          import java.util.ArrayList;
          public class MainActivity extends Activity {
              private ScrollWebView webView;
              private ProgressBar progressBar;
              private LinearLayout topBar;
              private RelativeLayout voiceOverlay;
              private TextView voiceResult;
              private SpeechRecognizer speechRecognizer;
              private static final String PREF_NAME = "aio_prefs";
              private static final String KEY_URL = "custom_url";
              private static final String DEFAULT_URL = "https://pointnorth.io";
              private String currentUrl;
              private Handler handler = new Handler();
              private Runnable hideTopBarRunnable = new Runnable() {
                  @Override public void run() { topBar.setVisibility(View.GONE); }
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  SharedPreferences prefs = getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                  currentUrl = prefs.getString(KEY_URL, DEFAULT_URL);
                  if (getIntent().hasExtra("url")) currentUrl = getIntent().getStringExtra("url");
                  webView = (ScrollWebView) findViewById(R.id.webview);
                  progressBar = (ProgressBar) findViewById(R.id.progress);
                  topBar = (LinearLayout) findViewById(R.id.topBar);
                  voiceOverlay = (RelativeLayout) findViewById(R.id.voiceOverlay);
                  voiceResult = (TextView) findViewById(R.id.voiceResult);
                  // Bắt scroll từ WebView → hiện/ẩn topBar
                  webView.setOnScrollChangedCallback(new ScrollWebView.OnScrollChangedCallback() {
                      @Override public void onScrollUp() { showTopBar(); }
                      @Override public void onScrollDown() { scheduleHideTopBar(); }
                  });
                  ((TextView) findViewById(R.id.btnBack)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { finish(); }
                  });
                  ((TextView) findViewById(R.id.btnVoice)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { showVoiceOverlay(); }
                  });
                  ((TextView) findViewById(R.id.btnSettingsWeb)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          startActivity(new Intent(MainActivity.this, SettingsActivity.class));
                      }
                  });
                  scheduleHideTopBar();
                  setupSpeech();
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
                  webView.setWebViewClient(new WebViewClient() {
                      @Override public void onPageStarted(ScrollWebView v, String url, Bitmap f) {
                          progressBar.setVisibility(View.VISIBLE);
                          String domain = url.replace("https://","").replace("http://","").split("/")[0];
                          ((TextView)findViewById(R.id.txtTitle)).setText(domain);
                      }
                      @Override public void onPageFinished(ScrollWebView v, String url) {
                          progressBar.setVisibility(View.GONE);
                      }
                      @Override public void onReceivedSslError(ScrollWebView v, SslErrorHandler h, SslError e) {
                          h.proceed();
                      }
                      @Override public boolean shouldOverrideUrlLoading(ScrollWebView v, String url) {
                          v.loadUrl(url); return true;
                      }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override public void onProgressChanged(ScrollWebView v, int p) {
                          progressBar.setProgress(p);
                          progressBar.setVisibility(p < 100 ? View.VISIBLE : View.GONE);
                      }
                  });
                  webView.setFocusable(true);
                  webView.setFocusableInTouchMode(true);
                  webView.setLongClickable(false);
                  webView.setOnLongClickListener(new View.OnLongClickListener() {
                      @Override public boolean onLongClick(View v) { return true; }
                  });
                  webView.loadUrl(currentUrl);
              }
              private void scheduleHideTopBar() {
                  handler.removeCallbacks(hideTopBarRunnable);
                  handler.postDelayed(hideTopBarRunnable, 5000);
              }
              private void showTopBar() {
                  runOnUiThread(new Runnable() {
                      @Override public void run() {
                          topBar.setVisibility(View.VISIBLE);
                          scheduleHideTopBar();
                      }
                  });
              }
              private void setupSpeech() {
                  if (!SpeechRecognizer.isRecognitionAvailable(this)) return;
                  speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle p) { voiceResult.setText("Dang nghe..."); }
                      @Override public void onResults(Bundle results) {
                          ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (matches != null && !matches.isEmpty()) {
                              final String text = matches.get(0).toLowerCase();
                              voiceResult.setText(matches.get(0));
                              handler.postDelayed(new Runnable() {
                                  @Override public void run() { hideVoiceOverlay(); }
                              }, 800);
                              handleVoiceCommand(text);
                          } else hideVoiceOverlay();
                      }
                      @Override public void onError(int error) {
                          voiceResult.setText("Khong nghe duoc, thu lai!");
                          handler.postDelayed(new Runnable() {
                              @Override public void run() { hideVoiceOverlay(); }
                          }, 1500);
                      }
                      @Override public void onBeginningOfSpeech() {}
                      @Override public void onRmsChanged(float v) {}
                      @Override public void onBufferReceived(byte[] b) {}
                      @Override public void onEndOfSpeech() {}
                      @Override public void onPartialResults(Bundle b) {}
                      @Override public void onEvent(int t, Bundle b) {}
                  });
              }
              private void handleVoiceCommand(String text) {
                  if (text.contains("phat") || text.contains("play") || text.contains("xem")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();", null);
                  } else if (text.contains("dung") || text.contains("pause") || text.contains("tam dung")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();", null);
                  } else if (text.contains("tua toi") || text.contains("forward")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                  } else if (text.contains("tua lui") || text.contains("rewind") || text.contains("quay lai")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                  } else if (text.contains("trang chu") || text.contains("home")) {
                      finish();
                  } else if (text.contains("cai dat") || text.contains("settings")) {
                      startActivity(new Intent(MainActivity.this, SettingsActivity.class));
                  } else {
                      String encoded = text.replace(" ", "+");
                      String searchUrl = currentUrl + "/search?q=" + encoded + "&s=" + encoded;
                      webView.evaluateJavascript(
                          "var inp=document.querySelector('input[type=search],input[name=keyword],input[name=q]');" +
                          "if(inp){inp.value='" + text + "';inp.dispatchEvent(new Event('input'));inp.form&&inp.form.submit();}" +
                          "else{window.location='" + searchUrl + "';}",
                          null);
                  }
              }
              private void showVoiceOverlay() {
                  if (speechRecognizer == null) return;
                  voiceOverlay.setVisibility(View.VISIBLE);
                  voiceResult.setText("");
                  Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "vi-VN");
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_PREFERENCE, "vi-VN");
                  intent.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 3);
                  speechRecognizer.startListening(intent);
              }
              private void hideVoiceOverlay() {
                  if (speechRecognizer != null) speechRecognizer.stopListening();
                  voiceOverlay.setVisibility(View.GONE);
              }
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (voiceOverlay.getVisibility() == View.VISIBLE) {
                      if (keyCode == KeyEvent.KEYCODE_BACK) { hideVoiceOverlay(); return true; }
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_UP) {
                      webView.scrollBy(0, -300); showTopBar(); return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_DOWN) { webView.scrollBy(0, 300); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_LEFT) { webView.scrollBy(-200, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_RIGHT) { webView.scrollBy(200, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_CENTER || keyCode == KeyEvent.KEYCODE_ENTER) {
                      webView.evaluateJavascript("document.activeElement&&document.activeElement.click();", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE || keyCode == KeyEvent.KEYCODE_MEDIA_PLAY) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_FAST_FORWARD) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_REWIND) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_BACK) {
                      if (webView.canGoBack()) { webView.goBack(); return true; }
                      finish(); return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MENU) { showVoiceOverlay(); return true; }
                  return super.onKeyDown(keyCode, event);
              }
              @Override protected void onPause() {
                  super.onPause(); webView.onPause();
                  handler.removeCallbacks(hideTopBarRunnable);
                  if (voiceOverlay.getVisibility() == View.VISIBLE) hideVoiceOverlay();
              }
              @Override protected void onResume() {
                  super.onResume(); webView.onResume(); showTopBar();
              }
              @Override protected void onDestroy() {
                  handler.removeCallbacksAndMessages(null);
                  if (speechRecognizer != null) speechRecognizer.destroy();
                  webView.destroy();
                  super.onDestroy();
              }
          }
          ENDOFFILE

      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml \
            -S res \
            -J build/gen \
            -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/allinone/app/R.java \
            src/com/allinone/app/ScrollWebView.java \
            src/com/allinone/app/HomeActivity.java \
            src/com/allinone/app/SettingsActivity.java \
            src/com/allinone/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx \
            --dex --output=build/classes.dex \
            build/classes
          cp build/resources.ap_ build/allinone.apk
          cd build && zip -u allinone.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/allinone.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=AllInOne,O=AllInOne,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out ALLINONE.apk build/aligned.apk

