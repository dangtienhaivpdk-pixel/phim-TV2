          cat > src/com/haitv/app/SettingsActivity.java << 'ENDOFFILE'
          package com.haitv.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.View;
          import android.view.ViewGroup;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import java.util.ArrayList;
          import java.util.Arrays;
          import java.util.List;
          public class SettingsActivity extends Activity {
              private static final String PREF_NAME = "haitv_prefs";
              private static final String KEY_URL = "custom_url";
              private static final String KEY_HISTORY = "url_history";
              private static final String DEFAULT_URL = "https://pointnorth.io";
              private static final String SEP = "|||";
              private EditText editUrl;
              private LinearLayout listUrls;
              private SharedPreferences prefs;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.settings);
                  prefs = getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                  editUrl = (EditText) findViewById(R.id.editUrl);
                  listUrls = (LinearLayout) findViewById(R.id.listUrls);
                  editUrl.setText(prefs.getString(KEY_URL, DEFAULT_URL));
                  renderHistory();
                  ((Button) findViewById(R.id.btnSave)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          String newUrl = editUrl.getText().toString().trim();
                          if (newUrl.isEmpty()) return;
                          if (!newUrl.startsWith("http")) newUrl = "https://" + newUrl;
                          saveAndOpen(newUrl);
                      }
                  });
                  ((Button) findViewById(R.id.btnReset)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) { saveAndOpen(DEFAULT_URL); }
                  });
              }
              private List<String> getHistory() {
                  String raw = prefs.getString(KEY_HISTORY, DEFAULT_URL);
                  return new ArrayList<String>(Arrays.asList(raw.split("\\|\\|\\|")));
              }
              private void addToHistory(String url) {
                  List<String> list = getHistory();
                  list.remove(url);
                  list.add(0, url);
                  if (list.size() > 20) list = list.subList(0, 20);
                  StringBuilder sb = new StringBuilder();
                  for (int i = 0; i < list.size(); i++) { if (i > 0) sb.append(SEP); sb.append(list.get(i)); }
                  prefs.edit().putString(KEY_HISTORY, sb.toString()).apply();
              }
              private void renderHistory() {
                  listUrls.removeAllViews();
                  List<String> history = getHistory();
                  String activeUrl = prefs.getString(KEY_URL, DEFAULT_URL);
                  for (final String url : history) {
                      LinearLayout row = new LinearLayout(this);
                      row.setOrientation(LinearLayout.HORIZONTAL);
                      row.setPadding(16, 12, 16, 12);
                      row.setBackgroundColor(url.equals(activeUrl) ? 0xff1a1a2e : 0xff111111);
                      LinearLayout.LayoutParams rp = new LinearLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      rp.setMargins(0,0,0,8); row.setLayoutParams(rp);
                      TextView txtUrl = new TextView(this);
                      txtUrl.setText((url.equals(activeUrl) ? "▶  " : "      ") + url);
                      txtUrl.setTextColor(url.equals(activeUrl) ? 0xffE50914 : 0xffcccccc);
                      txtUrl.setTextSize(16);
                      txtUrl.setLayoutParams(new LinearLayout.LayoutParams(0, ViewGroup.LayoutParams.WRAP_CONTENT, 1f));
                      row.addView(txtUrl);
                      Button btnUse = new Button(this);
                      btnUse.setText("Chon"); btnUse.setTextColor(Color.WHITE);
                      btnUse.setBackgroundColor(0xff333355); btnUse.setTextSize(13); btnUse.setPadding(16,8,16,8);
                      btnUse.setLayoutParams(new LinearLayout.LayoutParams(ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT));
                      btnUse.setOnClickListener(new View.OnClickListener() { @Override public void onClick(View v) { saveAndOpen(url); } });
                      Button btnDel = new Button(this);
                      btnDel.setText("X"); btnDel.setTextColor(Color.WHITE);
                      btnDel.setBackgroundColor(0xff660000); btnDel.setTextSize(13); btnDel.setPadding(16,8,16,8);
                      LinearLayout.LayoutParams dp = new LinearLayout.LayoutParams(ViewGroup.LayoutParams.WRAP_CONTENT, ViewGroup.LayoutParams.WRAP_CONTENT);
                      dp.setMargins(8,0,0,0); btnDel.setLayoutParams(dp);
                      btnDel.setOnClickListener(new View.OnClickListener() {
                          @Override public void onClick(View v) {
                              List<String> list = getHistory(); list.remove(url);
                              StringBuilder sb = new StringBuilder();
                              for (int i=0; i<list.size(); i++) { if (i>0) sb.append(SEP); sb.append(list.get(i)); }
                              prefs.edit().putString(KEY_HISTORY, sb.toString()).apply();
                              renderHistory();
                          }
                      });
                      row.addView(btnUse); row.addView(btnDel);
                      listUrls.addView(row);
                  }
              }
              private void saveAndOpen(String url) {
                  prefs.edit().putString(KEY_URL, url).apply();
                  addToHistory(url);
                  Intent i = new Intent(this, MainActivity.class);
                  i.putExtra("url", url);
                  i.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP);
                  startActivity(i); finish();
              }
          }
          ENDOFFILE

          cat > src/com/haitv/app/MainActivity.java << 'ENDOFFILE'
          package com.haitv.app;
          import android.app.Activity;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.os.Handler;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import android.net.http.SslError;
          import android.webkit.SslErrorHandler;
          import java.util.ArrayList;
          public class MainActivity extends Activity {
              private WebView webView;
              private ProgressBar progressBar;
              private View cursor;
              private RelativeLayout voiceOverlay;
              private TextView voiceResult;
              private SpeechRecognizer speechRecognizer;
              private static final String PREF_NAME = "haitv_prefs";
              private static final String KEY_URL = "custom_url";
              private static final String DEFAULT_URL = "https://pointnorth.io";
              private String currentUrl;
              private float cursorX = 640, cursorY = 360;
              private float STEP = 40f;
              private Handler handler = new Handler();
              private Runnable hideCursorRunnable = new Runnable() {
                  @Override public void run() { cursor.setVisibility(View.INVISIBLE); }
              };
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  SharedPreferences prefs = getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                  currentUrl = prefs.getString(KEY_URL, DEFAULT_URL);
                  if (getIntent().hasExtra("url")) currentUrl = getIntent().getStringExtra("url");
                  webView = (WebView) findViewById(R.id.webview);
                  progressBar = (ProgressBar) findViewById(R.id.progress);
                  cursor = (View) findViewById(R.id.cursor);
                  voiceOverlay = (RelativeLayout) findViewById(R.id.voiceOverlay);
                  voiceResult = (TextView) findViewById(R.id.voiceResult);
                  ((TextView) findViewById(R.id.btnSettings)).setOnClickListener(new View.OnClickListener() {
                      @Override public void onClick(View v) {
                          startActivity(new Intent(MainActivity.this, SettingsActivity.class));
                      }
                  });
                  cursor.post(new Runnable() {
                      @Override public void run() {
                          cursorX = webView.getWidth() / 2f;
                          cursorY = webView.getHeight() / 2f;
                          moveCursor(0, 0);
                      }
                  });
                  setupSpeech();
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
                  webView.setWebViewClient(new WebViewClient() {
                      @Override public void onPageStarted(WebView v, String url, Bitmap f) { progressBar.setVisibility(View.VISIBLE); }
                      @Override public void onPageFinished(WebView v, String url) { progressBar.setVisibility(View.GONE); }
                      @Override public void onReceivedSslError(WebView v, SslErrorHandler h, SslError e) { h.proceed(); }
                      @Override public boolean shouldOverrideUrlLoading(WebView v, String url) { v.loadUrl(url); return true; }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override public void onProgressChanged(WebView v, int p) {
                          progressBar.setProgress(p);
                          progressBar.setVisibility(p < 100 ? View.VISIBLE : View.GONE);
                      }
                  });
                  webView.setFocusable(true);
                  webView.setFocusableInTouchMode(true);
                  webView.setLongClickable(false);
                  webView.setOnLongClickListener(new View.OnLongClickListener() {
                      @Override public boolean onLongClick(View v) { return true; }
                  });
                  webView.loadUrl(currentUrl);
              }
              private void setupSpeech() {
                  speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener() {
                      @Override public void onReadyForSpeech(Bundle p) { voiceResult.setText("Dang nghe..."); }
                      @Override public void onResults(Bundle results) {
                          ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if (matches != null && !matches.isEmpty()) {
                              final String text = matches.get(0).toLowerCase();
                              voiceResult.setText(matches.get(0));
                              handler.postDelayed(new Runnable() { @Override public void run() { hideVoiceOverlay(); } }, 800);
                              handleVoiceCommand(text);
                          } else { hideVoiceOverlay(); }
                      }
                      @Override public void onError(int error) {
                          voiceResult.setText("Khong nghe duoc, thu lai!");
                          handler.postDelayed(new Runnable() { @Override public void run() { hideVoiceOverlay(); } }, 1500);
                      }
                      @Override public void onBeginningOfSpeech() {}
                      @Override public void onRmsChanged(float v) {}
                      @Override public void onBufferReceived(byte[] b) {}
                      @Override public void onEndOfSpeech() {}
                      @Override public void onPartialResults(Bundle b) {}
                      @Override public void onEvent(int t, Bundle b) {}
                  });
              }
              private void handleVoiceCommand(String text) {
                  if (text.contains("phat") || text.contains("play") || text.contains("xem")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();", null);
                  } else if (text.contains("dung") || text.contains("pause") || text.contains("tam dung")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();", null);
                  } else if (text.contains("tua toi") || text.contains("forward")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                  } else if (text.contains("tua lui") || text.contains("rewind") || text.contains("quay lai")) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                  } else if (text.contains("trang chu") || text.contains("home")) {
                      webView.loadUrl(currentUrl);
                  } else if (text.contains("cai dat") || text.contains("settings")) {
                      startActivity(new Intent(MainActivity.this, SettingsActivity.class));
                  } else {
                      String encoded = text.replace(" ", "+");
                      String searchUrl = currentUrl + "/search?q=" + encoded + "&s=" + encoded;
                      webView.evaluateJavascript(
                          "var inp=document.querySelector('input[type=search],input[name=keyword],input[name=q],input[placeholder*=tim],input[placeholder*=search]');" +
                          "if(inp){inp.value='" + text + "';inp.dispatchEvent(new Event('input'));inp.form&&inp.form.submit();}" +
                          "else{window.location='" + searchUrl + "';}",
                          null);
                  }
              }
              private void showVoiceOverlay() {
                  voiceOverlay.setVisibility(View.VISIBLE);
                  voiceResult.setText("");
                  Intent intent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "vi-VN");
                  intent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_PREFERENCE, "vi-VN");
                  intent.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS, 3);
                  speechRecognizer.startListening(intent);
              }
              private void hideVoiceOverlay() {
                  speechRecognizer.stopListening();
                  voiceOverlay.setVisibility(View.GONE);
              }
              private void moveCursor(float dx, float dy) {
                  int w = webView.getWidth();
                  int h = webView.getHeight();
                  cursorX = Math.max(0, Math.min(w-24, cursorX+dx));
                  cursorY = Math.max(0, Math.min(h-24, cursorY+dy));
                  RelativeLayout.LayoutParams p = new RelativeLayout.LayoutParams(48, 48);
                  p.leftMargin = (int) cursorX;
                  p.topMargin = (int) cursorY;
                  cursor.setLayoutParams(p);
                  cursor.setVisibility(View.VISIBLE);
                  handler.removeCallbacks(hideCursorRunnable);
                  handler.postDelayed(hideCursorRunnable, 3000);
              }
              private void doClick() {
                  long now = android.os.SystemClock.uptimeMillis();
                  MotionEvent down = MotionEvent.obtain(now, now, MotionEvent.ACTION_DOWN, cursorX, cursorY, 0);
                  MotionEvent up = MotionEvent.obtain(now, now+100, MotionEvent.ACTION_UP, cursorX, cursorY, 0);
                  webView.dispatchTouchEvent(down);
                  webView.dispatchTouchEvent(up);
                  down.recycle(); up.recycle();
              }
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (voiceOverlay.getVisibility() == View.VISIBLE) {
                      if (keyCode == KeyEvent.KEYCODE_BACK) { hideVoiceOverlay(); return true; }
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_UP) { moveCursor(0, -STEP); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_DOWN) { moveCursor(0, STEP); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_LEFT) { moveCursor(-STEP, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_RIGHT) { moveCursor(STEP, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_CENTER || keyCode == KeyEvent.KEYCODE_ENTER) {
                      doClick(); return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE || keyCode == KeyEvent.KEYCODE_MEDIA_PLAY) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_FAST_FORWARD) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_MEDIA_REWIND) {
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;", null);
                      return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_BACK) {
                      if (webView.canGoBack()) { webView.goBack(); return true; }
                  }
                  if (keyCode == KeyEvent.KEYCODE_MENU) {
                      startActivity(new Intent(MainActivity.this, SettingsActivity.class));
                      return true;
                  }
                  return super.onKeyDown(keyCode, event);
              }
              @Override
              public boolean onKeyLongPress(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_DPAD_CENTER || keyCode == KeyEvent.KEYCODE_ENTER) {
                      showVoiceOverlay(); return true;
                  }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_UP) { moveCursor(0, -STEP*3); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_DOWN) { moveCursor(0, STEP*3); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_LEFT) { moveCursor(-STEP*3, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_RIGHT) { moveCursor(STEP*3, 0); return true; }
                  return super.onKeyLongPress(keyCode, event);
              }
              @Override protected void onPause() {
                  super.onPause(); webView.onPause();
                  if (voiceOverlay.getVisibility() == View.VISIBLE) hideVoiceOverlay();
              }
              @Override protected void onResume() { super.onResume(); webView.onResume(); }
              @Override protected void onDestroy() {
                  handler.removeCallbacksAndMessages(null);
                  speechRecognizer.destroy();
                  webView.destroy();
                  super.onDestroy();
              }
          }
          ENDOFFILE

      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml \
            -S res \
            -J build/gen \
            -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/haitv/app/R.java \
            src/com/haitv/app/SettingsActivity.java \
            src/com/haitv/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx \
            --dex --output=build/classes.dex \
            build/classes
          cp build/resources.ap_ build/haitv.apk
          cd build && zip -u haitv.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/haitv.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=HaiTV,O=HaiTV,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out HAITV.apk build/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HAITV
          path: HAITV.apk
          retention-days: 30
