name: Build RoPhim TV APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Create project files
        run: |
          mkdir -p src/com/rophim/tv res/layout res/values

          cat > AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.rophim.tv">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.software.leanback" android:required="true" />
              <application
                  android:label="RoPhim TV"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:hardwareAccelerated="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          ENDOFFILE

          cat > res/layout/main.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <ProgressBar android:id="@+id/progress"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="6dp"
                  android:layout_alignParentTop="true"
                  android:max="100"
                  android:visibility="gone" />
          </RelativeLayout>
          ENDOFFILE

          cat > res/values/strings.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RoPhim TV</string>
          </resources>
          ENDOFFILE

          cat > src/com/rophim/tv/MainActivity.java << 'ENDOFFILE'
          package com.rophim.tv;
          import android.app.Activity;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          public class MainActivity extends Activity {
              private WebView webView;
              private ProgressBar progressBar;
              private static final String HOME = "https://pointnorth.io";
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  webView = (WebView) findViewById(R.id.webview);
                  progressBar = (ProgressBar) findViewById(R.id.progress);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
                  webView.setWebViewClient(new WebViewClient() {
                      public void onPageStarted(WebView v, String url, Bitmap f) { progressBar.setVisibility(View.VISIBLE); }
                      public void onPageFinished(WebView v, String url) { progressBar.setVisibility(View.GONE); }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      public void onProgressChanged(WebView v, int p) {
                          progressBar.setProgress(p);
                          progressBar.setVisibility(p < 100 ? View.VISIBLE : View.GONE);
                      }
                  });
                  webView.loadUrl(HOME);
              }
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK && webView.canGoBack()) { webView.goBack(); return true; }
                  return super.onKeyDown(keyCode, event);
              }
              @Override protected void onPause() { super.onPause(); webView.onPause(); }
              @Override protected void onResume() { super.onResume(); webView.onResume(); }
              @Override protected void onDestroy() { webView.destroy(); super.onDestroy(); }
          }
          ENDOFFILE

      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/34.0.0/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-34/android.jar \
            -M AndroidManifest.xml \
            -S res \
            -J build/gen \
            -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-34/android.jar \
            -d build/classes \
            build/gen/com/rophim/tv/R.java \
            src/com/rophim/tv/MainActivity.java
          $ANDROID_HOME/build-tools/34.0.0/d8 \
            --output build/ \
            $(find build/classes -name "*.class")
          cp build/resources.ap_ build/rophim.apk
          cd build && zip -u rophim.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/34.0.0/zipalign -f 4 build/rophim.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=RoPhim,O=RoPhim,C=VN"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out RoPhimTV.apk build/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoPhimTV
          path: RoPhimTV.apk
          retention-days: 30
