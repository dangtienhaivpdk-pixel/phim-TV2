              }
              private void addHist(String url){
                  List<String>list=getHist();list.remove(url);list.add(0,url);
                  if(list.size()>30)list=list.subList(0,30);
                  StringBuilder sb=new StringBuilder();
                  for(int i=0;i<list.size();i++){if(i>0)sb.append(SEP);sb.append(list.get(i));}
                  prefs.edit().putString(KEY_HIST,sb.toString()).apply();
              }
