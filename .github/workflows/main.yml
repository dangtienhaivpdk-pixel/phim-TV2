name: Build ALL IN ONE Subtitle AI
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Source
        run: |
          mkdir -p app/src/main/java/com/allinone/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Cấu hình Gradle chuẩn
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath "com.android.tools.build:gradle:8.2.2" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.allinone.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.allinone.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 53
                  versionName "53.0-AI"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF
          echo "include ':app'" > settings.gradle

          # 2. Manifest với quyền INTERNET
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.allinone.app">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="ALL IN ONE AI" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. MainActivity với Logic AI Thuyết Minh
          cat > app/src/main/java/com/allinone/app/MainActivity.java << 'EOF'
          package com.allinone.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.webkit.*;
          import java.util.Locale;

          public class MainActivity extends Activity {
              private WebView webView;
              private TextToSpeech tts;
              private String lastText = "";

              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  webView = new WebView(this);
                  setContentView(webView);

                  // Khởi tạo AI Giọng nói
                  tts = new TextToSpeech(this, status -> {
                      if (status != TextToSpeech.ERROR) tts.setLanguage(new Locale("vi", "VN"));
                  });

                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  
                  // Cầu nối giữa Web và Android
                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void processSub(String text) {
                          if (!text.equals(lastText) && !text.isEmpty()) {
                              lastText = text;
                              tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                          }
                      }
                  }, "AI_Bridge");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          injectSubtitleScript();
                      }
                  });

                  webView.loadUrl("https://www.google.com"); 
              }

              private void injectSubtitleScript() {
                  // Script này sẽ "rình" các thẻ div/span chứa phụ đề
                  String js = "setInterval(function() {" +
                              "  var sub = '';" +
                              "  var selectors = ['.ytp-caption-segment', '.subtitle', '.sub-text', '.jw-captions'];" +
                              "  for (var s of selectors) {" +
                              "    var el = document.querySelector(s);" +
                              "    if (el) { sub = el.innerText; break; }" +
                              "  }" +
                              "  if (sub) window.AI_Bridge.processSub(sub);" +
                              "}, 500);";
                  webView.evaluateJavascript(js, null);
              }
          }
          EOF

      - name: Build APK
        run: ./gradlew assembleRelease || gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ALL-IN-ONE-AI-Sub
          path: app/build/outputs/apk/release/*.apk
