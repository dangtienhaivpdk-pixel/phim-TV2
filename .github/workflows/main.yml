                  <LinearLayout android:id="@+id/gridLinks"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical" android:focusable="false"/>
              </ScrollView>
          </LinearLayout>
          XMLEOF

          cat > res/layout/main.xml << 'XMLEOF'
