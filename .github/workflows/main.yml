          # ── CursorView ─────────────────────────────────────────────────────────────
          cat > src/com/allinone/app/CursorView.java << 'JEOF'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.graphics.Typeface;
          import android.util.AttributeSet;
          import android.view.View;
          public class CursorView extends View {
              public static final int MODE_NORMAL=0,MODE_HOLD=1,MODE_DRAG=2,MODE_SCROLL=3;
              private final Paint wFill,bStroke,rDot,lblBg,lblTxt;
              private float cx=-1,cy=-1;
              private int mode=MODE_NORMAL;
              public CursorView(Context c){super(c);wFill=pw();bStroke=ps();rDot=pd();lblBg=pb();lblTxt=pt();}
              public CursorView(Context c,AttributeSet a){super(c,a);wFill=pw();bStroke=ps();rDot=pd();lblBg=pb();lblTxt=pt();}
              private Paint pw(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFFFFFFF);p.setStyle(Paint.Style.FILL);return p;}
              private Paint ps(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFF000000);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(2.5f);p.setStrokeJoin(Paint.Join.ROUND);return p;}
              private Paint pd(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFE50914);p.setStyle(Paint.Style.FILL);return p;}
              private Paint pb(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setStyle(Paint.Style.FILL);return p;}
              private Paint pt(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFFFFFFF);p.setTextSize(20f);p.setTypeface(Typeface.DEFAULT_BOLD);return p;}
              public void setPos(float x,float y){cx=x;cy=y;invalidate();}
              public float getCX(){return cx;}
              public float getCY(){return cy;}
              public void setMode(int m){if(mode!=m){mode=m;invalidate();}}
              public int getMode(){return mode;}
              @Override protected void onDraw(Canvas c){
                  if(cx<0||cy<0)return;
                  switch(mode){
                      case MODE_HOLD:  wFill.setColor(0xFFFFAA00);break;
                      case MODE_DRAG:  wFill.setColor(0xFF00CCFF);break;
                      case MODE_SCROLL:wFill.setColor(0xFF00FF88);break;
                      default:         wFill.setColor(0xFFFFFFFF);break;
                  }
                  Path p=new Path();
                  p.moveTo(cx,cy);p.lineTo(cx,cy+26);p.lineTo(cx+7,cy+19);
                  p.lineTo(cx+15,cy+32);p.lineTo(cx+19,cy+30);
                  p.lineTo(cx+11,cy+17);p.lineTo(cx+20,cy+17);p.close();
                  c.drawPath(p,bStroke);c.drawPath(p,wFill);
                  c.drawCircle(cx,cy,4f,rDot);
                  String lbl=mode==MODE_HOLD?"HOLD":mode==MODE_DRAG?"DRAG":mode==MODE_SCROLL?"SCR":null;
                  if(lbl!=null){
                      float tw=lblTxt.measureText(lbl);float lx=cx+22,ly=cy+14;
                      lblBg.setColor(mode==MODE_HOLD?0xCCCC8800:mode==MODE_DRAG?0xCC0088CC:0xCC008844);
                      c.drawRoundRect(lx-4,ly-18,lx+tw+8,ly+6,6,6,lblBg);
                      c.drawText(lbl,lx,ly,lblTxt);
                  }
              }
          }
          JEOF

