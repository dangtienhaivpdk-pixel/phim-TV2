                              return true;
                          case KeyEvent.KEYCODE_DPAD_RIGHT:
                              if(gridIdx+1<total){highlightCard(gridIdx,false);gridIdx++;highlightCard(gridIdx,true);scrollToCard(gridIdx);}
                              return true;
                          case KeyEvent.KEYCODE_DPAD_CENTER:case KeyEvent.KEYCODE_ENTER:
                              if(e.getRepeatCount()==0&&!urls.isEmpty())openUrl(urls.get(gridIdx));return true;
                          case KeyEvent.KEYCODE_MENU:
                              startActivity(new Intent(HomeActivity.this,SettingsActivity.class));return true;
                          case KeyEvent.KEYCODE_BACK:finish();return true;
                      }
                  }
                  return super.onKeyDown(key,e);
              }
          }
