           else if(!inZ&&barVisible){handler.removeCallbacks(hideBarRun);handler.postDelayed(hideBarRun,1800);}\n              }\n              private void stopEdge(){edgeDir=0;edgeTick=0;handler.removeCallbacks(edgeRun);}\n              @Override public boolean onKeyDown(int key,KeyEvent e){\n                  wakeC();\n                  if(inputOverlay.getVisibility()==View.VISIBLE){\n                      if(key==KeyEvent.KEYCODE_BACK){closeInputOverlay();return true;}\n                      if((key==KeyEvent.KEYCODE_DPAD_CENTER||key==KeyEvent.KEYCODE_ENTER)&&e.getRepeatCount()==0){submitInputOverlay();return true;}\n                      return false;}\n                  if(voiceOverlay.getVisibility()==View.VISIBLE){\n                      if(key==KeyEvent.KEYCODE_BACK){hideVoice();return true;}return true;}\n                  int rep=e.getRepeatCount();\n                  switch(key){\n                      case KeyEvent.KEYCODE_DPAD_UP:   moveCursor(0,-1,rep);return true;\n                      case KeyEvent.KEYCODE_DPAD_DOWN: moveCursor(0, 1,rep);return true;\n                      case KeyEvent.KEYCODE_DPAD_LEFT: moveCursor(-1,0,rep);return true;\n                      case KeyEvent.KEYCODE_DPAD_RIGHT:moveCursor( 1,0,rep);return true;\n                      case KeyEvent.KEYCODE_DPAD_CENTER:\n                      case KeyEvent.KEYCODE_ENTER:\n                          if(rep==0){\n                              okDown=true;okT=SystemClock.uptimeMillis();\n                              float[]rc=wc();okX=rc[0];okY=rc[1];\n                              if(dragMode){toggleDrag();}\n                              else{handler.postDelayed(holdRun,HOLD_MS);}\n                          }\n                          return true;\n                      case KeyEvent.KEYCODE_MENU:if(rep==0)toggleDrag();return true;\n                      case KeyEvent.KEYCODE_BUTTON_L1:case KeyEvent.KEYCODE_CHANNEL_DOWN:case KeyEvent.KEYCODE_PAGE_UP:\n                          cursorView.setMode(CursorView.MODE_SCROLL);pgScroll(-SCR_AMT);\n                          handler.removeCallbacks(clrScrollMode);handler.postDelayed(clrScrollMode,300);return true;\n                      case KeyEvent.KEYCODE_BUTTON_R1:case KeyEvent.KEYCODE_CHANNEL_UP:case KeyEvent.KEYCODE_PAGE_DOWN:\n                          cursorView.setMode(CursorView.MODE_SCROLL);pgScroll(SCR_AMT);\n                          handler.removeCallbacks(clrScrollMode);handler.postDelayed(clrScrollMode,300);return true;\n                      case KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE:case KeyEvent.KEYCODE_MEDIA_PLAY:\n                          webView.evaluateJavascript(\"var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}\",null);return true;\n                      case KeyEvent.KEYCODE_MEDIA_FAST_FORWARD:\n                          webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.currentTime+=10;\",null);return true;\n                      case KeyEvent.KEYCODE_MEDIA_REWIND:\n                          webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.currentTime-=10;\",null);return true;\n                      case KeyEvent.KEYCODE_SEARCH:case KeyEvent.KEYCODE_VOICE_ASSIST:showVoice();return true;\n                      case KeyEvent.KEYCODE_BACK:\n                          if(dragMode){dragMode=false;cursorView.setMode(CursorView.MODE_NORMAL);return true;}\n                          if(webView.canGoBack()){webView.goBack();return true;}\n                          finish();return true;\n                  }\n                  return super.onKeyDown(key,e);\n              }\n              @Override public boolean onKeyUp(int key,KeyEvent e){\n                  if(key==KeyEvent.KEYCODE_DPAD_UP||key==KeyEvent.KEYCODE_DPAD_DOWN\n                      ||key==KeyEvent.KEYCODE_DPAD_LEFT||key==KeyEvent.KEYCODE_DPAD_RIGHT)stopEdge();\n                  if((key==KeyEvent.KEYCODE_DPAD_CENTER||key==KeyEvent.KEYCODE_ENTER)&&okDown){\n                      okDown=false;handler.removeCallbacks(holdRun);\n                      long held=SystemClock.uptimeMillis()-okT;\n                      if(!dragMode){\n                          if(held<HOLD_MS){clickAtBarOrWeb();}\n                          else{tUp(okX,okY,okT);cursorView.setMode(CursorView.MODE_NORMAL);}\n                      }\n                      return true;\n                  }\n                  return super.onKeyUp(key,e);\n              }\n              private void clickAtBarOrWeb(){\n                  wakeC();stopEdge();\n                  float sx=cursorView.getCX(),sy=cursorView.getCY();\n                  if(barVisible){\n                      int[]ids={R.id.btnHome,R.id.btnWebBack,R.id.btnWebForward,R.id.btnRefresh,R.id.btnSettingsWeb};\n                      for(int id:ids){View b=findViewById(id);int[]loc=new int[2];b.getLocationOnScreen(loc);\n                          if(sx>=loc[0]&&sx<loc[0]+b.getWidth()&&sy>=loc[1]&&sy<loc[1]+b.getHeight()){b.performClick();return;}}\n                  }\n                  click();\n              }\n              private void toggleDrag(){\n                  if(!dragMode){dragMode=true;dragT=SystemClock.uptimeMillis();\n                      float[]rc=wc();tDown(rc[0],rc[1]);cursorView.setMode(CursorView.MODE_DRAG);\n                  }else{dragMode=false;float[]rc=wc();tUp(rc[0],rc[1],dragT);cursorView.setMode(CursorView.MODE_NORMAL);}\n              }\n              private void setupSpeech(){\n                  if(!SpeechRecognizer.isRecognitionAvailable(this))return;\n                  speechRecognizer=SpeechRecognizer.createSpeechRecognizer(this);\n                  speechRecognizer.setRecognitionListener(new RecognitionListener(){\n                      @Override public void onReadyForSpeech(Bundle p){voiceResult.setText(\"\u0110ang nghe...\");}\n                      @Override public void onResults(Bundle r){\n                          ArrayList<String>m=r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);\n                          if(m!=null&&!m.isEmpty()){final String tt=m.get(0).toLowerCase();\n                          voiceResult.setText(m.get(0));\n                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},800);\n                          handleVoice(tt);}else hideVoice();}\n                      @Override public void onError(int err){voiceResult.setText(\"L\u1ed7i nh\u1eadn gi\u1ecdng\");\n                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},1500);}\n                      @Override public void onBeginningOfSpeech(){}@Override public void onRmsChanged(float v){}\n                      @Override public void onBufferReceived(byte[]b){}@Override public void onEndOfSpeech(){}\n                      @Override public void onPartialResults(Bundle b){}@Override public void onEvent(int t,Bundle b){}\n                  });\n              }\n              private void handleVoice(String t){\n                  if(t.contains(\"ph\u00e1t\")||t.contains(\"play\"))webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.play();\",null);\n                  else if(t.contains(\"d\u1eebng\")||t.contains(\"pause\"))webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.pause();\",null);\n                  else if(t.contains(\"tua t\u1edbi\"))webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.currentTime+=10;\",null);\n                  else if(t.contains(\"tua l\u00f9i\"))webView.evaluateJavascript(\"var v=document.querySelector('video');if(v)v.currentTime-=10;\",null);\n                  else if(t.contains(\"trang ch\u1ee7\")||t.contains(\"home\"))finish();\n                  else if(t.contains(\"c\u00e0i \u0111\u1eb7t\"))startActivity(new Intent(MainActivity.this,SettingsActivity.class));\n              }\n              private void showVoice(){\n                  if(speechRecognizer==null)return;\n                  voiceOverlay.setVisibility(View.VISIBLE);voiceResult.setText(\"\");\n                  Intent i=new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);\n                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);\n                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE,\"vi-VN\");\n                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS,3);\n                  speechRecognizer.startListening(i);\n              }\n              private void hideVoice(){if(speechRecognizer!=null)speechRecognizer.stopListening();voiceOverlay.setVisibility(View.GONE);}\n              @Override protected void onPause(){\n                  super.onPause();webView.onPause();\n                  savedCX=cursorView.getCX();savedCY=cursorView.getCY();\n                  if(dragMode){dragMode=false;float[]rc=wc();tUp(rc[0],rc[1],dragT);}\n                  stopEdge();handler.removeCallbacksAndMessages(null);}\n              @Override protected void onResume(){super.onResume();webView.onResume();wakeC();}\n              @Override protected void onDestroy(){\n                  handler.removeCallbacksAndMessages(null);\n                  if(speechRecognizer!=null)speechRecognizer.destroy();\n                  webView.destroy();super.onDestroy();}\n          }
