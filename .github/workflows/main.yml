                  if(v instanceof ViewGroup){
                      ViewGroup vg=(ViewGroup)v;
                      for(int i=vg.getChildCount()-1;i>=0;i--){
                          View found=hitTest(vg.getChildAt(i),tx,ty);
                          if(found!=null)return found;
                      }
                  }
                  if(v.isClickable()&&!(v instanceof CursorView))return v;
                  return null;
              }
