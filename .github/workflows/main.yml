          package com.allinone.app;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.SystemClock;
          import android.speech.RecognitionListener;
          import android.speech.RecognizerIntent;
          import android.speech.SpeechRecognizer;
          import android.view.KeyEvent;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.LinearLayout;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import android.net.http.SslError;
          import android.webkit.SslErrorHandler;
          import java.util.ArrayList;
          public class MainActivity extends BaseActivity {
              private ScrollWebView webView;
              private ProgressBar progressBar;
              private LinearLayout topBar;
              private RelativeLayout voiceOverlay;
              private TextView voiceResult;
              private SpeechRecognizer speechRecognizer;
              private static final String PREF="aio_prefs",KEY_URL="custom_url",DEF="https://pointnorth.io";
              private String currentUrl;
              private Handler handler=new Handler();
              private boolean topBarLocked=false;
              private Runnable hideBar=new Runnable(){@Override public void run(){if(!topBarLocked)topBar.setVisibility(View.GONE);}};

              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  SharedPreferences prefs=getSharedPreferences(PREF,Context.MODE_PRIVATE);
                  currentUrl=prefs.getString(KEY_URL,DEF);
                  if(getIntent().hasExtra("url"))currentUrl=getIntent().getStringExtra("url");
                  webView=(ScrollWebView)findViewById(R.id.webview);
                  progressBar=(ProgressBar)findViewById(R.id.progress);
                  topBar=(LinearLayout)findViewById(R.id.topBar);
                  voiceOverlay=(RelativeLayout)findViewById(R.id.voiceOverlay);
                  voiceResult=(TextView)findViewById(R.id.voiceResult);
                  webView.setOnScrollChangedCallback(new ScrollWebView.OnScrollChangedCallback(){
                      @Override public void onScrollUp(){showBar(false);}
                      @Override public void onScrollDown(){schedBar();}
                  });
                  findViewById(R.id.btnBack).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){finish();}});
                  findViewById(R.id.btnVoice).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){showVoice();}});
                  findViewById(R.id.btnSettingsWeb).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){startActivity(new Intent(MainActivity.this,SettingsActivity.class));}});
                  showBar(false);
                  setupSpeech();
                  WebSettings ws=webView.getSettings();
                  ws.setJavaScriptEnabled(true);ws.setDomStorageEnabled(true);
                  ws.setMediaPlaybackRequiresUserGesture(false);ws.setUseWideViewPort(true);
                  ws.setLoadWithOverviewMode(true);ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setBuiltInZoomControls(false);ws.setDisplayZoomControls(false);
                  ws.setAppCacheEnabled(true);ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setRenderPriority(WebSettings.RenderPriority.HIGH);
                  ws.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE,null);
                  webView.setWebViewClient(new WebViewClient(){
                      @Override public void onPageStarted(WebView v,String url,Bitmap f){
                          progressBar.setVisibility(View.VISIBLE);
                          ((TextView)findViewById(R.id.txtTitle)).setText(url.replace("https://","").replace("http://","").split("/")[0]);
                      }
                      @Override public void onPageFinished(WebView v,String url){progressBar.setVisibility(View.GONE);}
                      @Override public void onReceivedSslError(WebView v,SslErrorHandler h,SslError e){h.proceed();}
                      @Override public boolean shouldOverrideUrlLoading(WebView v,String url){v.loadUrl(url);return true;}
                  });
                  webView.setWebChromeClient(new WebChromeClient(){
                      @Override public void onProgressChanged(WebView v,int p){progressBar.setProgress(p);progressBar.setVisibility(p<100?View.VISIBLE:View.GONE);}
                  });
                  webView.setFocusable(true);webView.setFocusableInTouchMode(true);
                  webView.setLongClickable(false);
                  webView.setOnLongClickListener(new View.OnLongClickListener(){@Override public boolean onLongClick(View v){return true;}});
                  webView.loadUrl(currentUrl);
              }

              // Khi clickUnder() không tìm được view → click WebView
              @Override protected void onCursorClick(){
                  float cx=cursor.getX(), cy=cursor.getY();
                  // Kiểm tra topBar
                  if(topBar.getVisibility()==View.VISIBLE){
                      int[]loc=new int[2];topBar.getLocationOnScreen(loc);
                      if(cy>=loc[1]&&cy<=loc[1]+topBar.getHeight()){
                          int[]btnIds={R.id.btnBack,R.id.btnVoice,R.id.btnSettingsWeb};
                          for(int id:btnIds){
                              View btn=findViewById(id);int[]bl=new int[2];btn.getLocationOnScreen(bl);
                              if(cx>=bl[0]&&cx<=bl[0]+btn.getWidth()&&cy>=bl[1]&&cy<=bl[1]+btn.getHeight()){btn.performClick();return;}
                          }
                          return;
                      }
                  }
                  // Click WebView tại tọa độ tương đối
                  int[]wl=new int[2];webView.getLocationOnScreen(wl);
                  final float rx=cx-wl[0], ry=cy-wl[1];
                  final long t=SystemClock.uptimeMillis();
                  MotionEvent dn=MotionEvent.obtain(t,t,MotionEvent.ACTION_DOWN,rx,ry,0);
                  webView.dispatchTouchEvent(dn);dn.recycle();
                  handler.postDelayed(new Runnable(){@Override public void run(){
                      long t2=SystemClock.uptimeMillis();
                      MotionEvent up=MotionEvent.obtain(t,t2,MotionEvent.ACTION_UP,rx,ry,0);
                      webView.dispatchTouchEvent(up);up.recycle();
                  }},120);
              }

              // Override moveCursor để xử lý topBar lock
              @Override protected void moveCursor(float dx,float dy){
                  super.moveCursor(dx,dy);
                  float cy=cursor.getY();
                  if(cy<=60){topBarLocked=true;showBar(true);}
                  else if(topBarLocked){topBarLocked=false;schedBar();}
              }

              private void schedBar(){handler.removeCallbacks(hideBar);if(!topBarLocked)handler.postDelayed(hideBar,4000);}
              private void showBar(final boolean lock){runOnUiThread(new Runnable(){@Override public void run(){topBar.setVisibility(View.VISIBLE);if(!lock)schedBar();}});}

              private void setupSpeech(){
                  if(!SpeechRecognizer.isRecognitionAvailable(this))return;
                  speechRecognizer=SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener(){
                      @Override public void onReadyForSpeech(Bundle p){voiceResult.setText("Dang nghe...");}
                      @Override public void onResults(Bundle r){
                          ArrayList<String>m=r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if(m!=null&&!m.isEmpty()){final String t=m.get(0).toLowerCase();voiceResult.setText(m.get(0));
                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},800);handleVoice(t);}
                          else hideVoice();
                      }
                      @Override public void onError(int e){voiceResult.setText("Khong nghe duoc!");handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},1500);}
                      @Override public void onBeginningOfSpeech(){}@Override public void onRmsChanged(float v){}
                      @Override public void onBufferReceived(byte[]b){}@Override public void onEndOfSpeech(){}
                      @Override public void onPartialResults(Bundle b){}@Override public void onEvent(int t,Bundle b){}
                  });
              }
              private void handleVoice(String t){
                  if(t.contains("phat")||t.contains("play"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();",null);
                  else if(t.contains("dung")||t.contains("pause"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();",null);
                  else if(t.contains("tua toi"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);
                  else if(t.contains("tua lui")||t.contains("quay lai"))webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);
                  else if(t.contains("trang chu")||t.contains("home"))finish();
                  else if(t.contains("cai dat"))startActivity(new Intent(this,SettingsActivity.class));
              }
              private void showVoice(){
                  if(speechRecognizer==null)return;
                  voiceOverlay.setVisibility(View.VISIBLE);voiceResult.setText("");
                  Intent i=new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE,"vi-VN");i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS,3);
                  speechRecognizer.startListening(i);
              }
              private void hideVoice(){if(speechRecognizer!=null)speechRecognizer.stopListening();voiceOverlay.setVisibility(View.GONE);}

              @Override public boolean onKeyDown(int k,KeyEvent e){
                  if(voiceOverlay.getVisibility()==View.VISIBLE){if(k==KeyEvent.KEYCODE_BACK){hideVoice();return true;}return true;}
                  if(k==KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE||k==KeyEvent.KEYCODE_MEDIA_PLAY){
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}",null);return true;}
                  if(k==KeyEvent.KEYCODE_MEDIA_FAST_FORWARD){webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);return true;}
                  if(k==KeyEvent.KEYCODE_MEDIA_REWIND){webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);return true;}
                  if(k==KeyEvent.KEYCODE_BACK){if(webView.canGoBack()){webView.goBack();return true;}finish();return true;}
                  if(k==KeyEvent.KEYCODE_MENU){showVoice();return true;}
                  return super.onKeyDown(k,e);
              }
              @Override protected void onPause(){super.onPause();webView.onPause();handler.removeCallbacks(hideBar);if(voiceOverlay.getVisibility()==View.VISIBLE)hideVoice();}
              @Override protected void onResume(){super.onResume();webView.onResume();showBar(false);}
              @Override protected void onDestroy(){handler.removeCallbacksAndMessages(null);if(speechRecognizer!=null)speechRecognizer.destroy();webView.destroy();super.onDestroy();}
          }
          ENDOFFILE

