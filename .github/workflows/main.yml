                      +"try{Object.defineProperty(screen,'height',{get:function(){return 1080;},configurable:true})}catch(ex){}"
                      // Phần 3: MutationObserver - theo dõi DOM, ẩn ngay khi overlay được tạo ra
                      +"if(!window._aioObs){"
                      +"window._aioObs=true;"
                      +"var _hide=function(node){"
                      +"  if(!node||!node.className)return;"
                      +"  var c=typeof node.className==='string'?node.className:'';"
                      +"  var id=node.id||'';"
                      +"  if(/rotate|portrait|turn.device|landscape.guide|orientation/i.test(c+id)){"
                      +"    node.style.cssText='display:none!important;visibility:hidden!important;opacity:0!important;';"
                      +"  }"
                      +"};"
                      +"var obs=new MutationObserver(function(muts){"
                      +"  muts.forEach(function(m){"
                      +"    m.addedNodes.forEach(function(n){if(n.nodeType===1){_hide(n);"
                      +"      n.querySelectorAll&&n.querySelectorAll('[class*=\"rotate\"],[class*=\"portrait\"],[id*=\"rotate\"],[id*=\"portrait\"]').forEach(_hide);"
                      +"    }});"
                      +"  });"
                      +"});"
                      +"obs.observe(document.body||document.documentElement,{childList:true,subtree:true});"
                      +"}"
                      // Phần 4: misc - tắt scroll smooth, chặn _blank
                      +"document.documentElement.style.scrollBehavior='auto';"
                      +"if(document.body)document.body.style.overscrollBehavior='none';"
                      +"document.querySelectorAll('a[target]').forEach(function(a){if(a.target===\"_blank\")a.target=\"_self\";});"
                      +"window.open=function(u){if(u)location.href=u;return null};"
                      // Phần 5: keyboard bridge - click và focus trên input → show keyboard
                      +"if(!window._aioKbd){"
                      +"window._aioKbd=true;"
                      // focusin: mọi cách focus vào input đều bắt được
                      +"document.addEventListener('focusin',function(e){"
                      +"  var t=e.target;"
                      +"  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.contentEditable==='true')){"
                      +"    try{var len=t.value?t.value.length:0;t.setSelectionRange(len,len);}catch(ex){}"
                      +"    if(window.AIO)window.AIO.onInputFocus();"
                      +"  }"
                      +"},true);"
                      // focusout: ẩn keyboard
                      +"document.addEventListener('focusout',function(e){"
                      +"  var t=e.target;"
                      +"  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.contentEditable==='true')){"
                      +"    if(window.AIO)window.AIO.onInputBlur();"
                      +"  }"
                      +"},true);"
                      // mousedown/touchstart: kích hoạt focus + keyboard sớm nhất có thể
                      +"document.addEventListener('mousedown',function(e){"
                      +"  var t=e.target;"
                      +"  if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.contentEditable==='true')){"
                      +"    t.focus();"
                      +"    if(window.AIO)window.AIO.onInputFocus();"
                      +"  }"
                      +"},true);"
                      +"}"
                      +"})();";
                  v.evaluateJavascript(cssInject,null);
              }
              // =====================================================================
              // [v27] KbdBridge: onInputFocus cấp focus + show IME đúng cách cho TV
              // =====================================================================
              private class KbdBridge {
                  @android.webkit.JavascriptInterface
                  public void onInputFocus(){
                      handler.post(new Runnable(){@Override public void run(){
                          inputFocused=true;
                          // Bước 1: cấp focusable cho webView để IME gắn vào
                          webView.setFocusable(true);
                          webView.setFocusableInTouchMode(true);
                          webView.requestFocus();
                          // Bước 2: show IME ngay
                          imm.showSoftInput(webView,InputMethodManager.SHOW_FORCED);
                          // Bước 3: retry sau 200ms phòng IME chưa sẵn sàng
                          handler.postDelayed(new Runnable(){@Override public void run(){
                              if(inputFocused)imm.showSoftInput(webView,InputMethodManager.SHOW_FORCED);
                          }},200);
                      }});
                  }
                  @android.webkit.JavascriptInterface
                  public void onInputBlur(){
                      handler.post(new Runnable(){@Override public void run(){
                          inputFocused=false;
                          imm.hideSoftInputFromWindow(webView.getWindowToken(),0);
                          // Trả webView về không focusable → D-pad điều cursor bình thường
                          handler.postDelayed(new Runnable(){@Override public void run(){
                              if(!inputFocused){
                                  webView.setFocusable(false);
                                  webView.setFocusableInTouchMode(false);
                              }
                          }},100);
                      }});
                  }
              }
              private void moveCursor(float dx,float dy,int rep){
                  if(inputFocused)return;
                  wakeC();
                  float t=Math.min(1f,(float)rep/ACCEL_TICKS);
                  float step=STEP_MIN+(STEP_MAX-STEP_MIN)*t;
                  float nx=Math.max(0,Math.min(screenW-2,cursorView.getCX()+dx*step));
                  float ny=cursorView.getCY()+dy*step;
                  int newDir=0;
                  if(ny>=screenH-10)newDir=1;
                  else if(ny<=10)newDir=-1;
                  ny=Math.max(0,Math.min(screenH-2,ny));
                  cursorView.setPos(nx,ny);savedCX=nx;savedCY=ny;
                  if(newDir!=edgeDir){
                      edgeDir=newDir;edgeTicks=0;
                      handler.removeCallbacks(edgeScroll);
                      if(newDir!=0)handler.post(edgeScroll);
                  }
                  boolean inZ=(nx<=BAR_ZONE_W&&ny>=screenH-BAR_ZONE_H);
                  if(inZ&&!barVisible){bottomBar.setVisibility(View.VISIBLE);barVisible=true;handler.removeCallbacks(hideBar);}
                  else if(!inZ&&barVisible){handler.removeCallbacks(hideBar);handler.postDelayed(hideBar,2000);}
              }
              private void stopEdge(){edgeDir=0;edgeTicks=0;handler.removeCallbacks(edgeScroll);}
              private void clickAt(){
                  wakeC();stopEdge();
                  float sx=cursorView.getCX(),sy=cursorView.getCY();
                  if(barVisible){
                      int[]ids={R.id.btnHome,R.id.btnWebBack,R.id.btnSettingsWeb};
                      for(int id:ids){View b=findViewById(id);int[]loc=new int[2];b.getLocationOnScreen(loc);
                          if(sx>=loc[0]&&sx<loc[0]+b.getWidth()&&sy>=loc[1]&&sy<loc[1]+b.getHeight()){b.performClick();return;}}
                  }
                  int[]wl=new int[2];webView.getLocationOnScreen(wl);
                  final float rx=sx-wl[0],ry=sy-wl[1];
                  final long t0=SystemClock.uptimeMillis();
                  MotionEvent dn=MotionEvent.obtain(t0,t0,MotionEvent.ACTION_DOWN,rx,ry,0);
                  webView.dispatchTouchEvent(dn);dn.recycle();
                  handler.postDelayed(new Runnable(){@Override public void run(){
                      long t1=SystemClock.uptimeMillis();
                      MotionEvent up=MotionEvent.obtain(t0,t1,MotionEvent.ACTION_UP,rx,ry,0);
                      webView.dispatchTouchEvent(up);up.recycle();
                  }},80);
              }
              private void scrollPage(int dy){
                  webView.scrollBy(0,dy);
                  float sx=cursorView.getCX(),sy=cursorView.getCY();
                  int[]wl=new int[2];webView.getLocationOnScreen(wl);
                  float rx=sx-wl[0],ry=sy-wl[1];long t=SystemClock.uptimeMillis();
                  MotionEvent.PointerProperties[]pp=new MotionEvent.PointerProperties[1];
                  pp[0]=new MotionEvent.PointerProperties();pp[0].id=0;
                  pp[0].toolType=MotionEvent.TOOL_TYPE_MOUSE;
                  MotionEvent.PointerCoords[]pc=new MotionEvent.PointerCoords[1];
                  pc[0]=new MotionEvent.PointerCoords();pc[0].x=rx;pc[0].y=ry;
                  pc[0].setAxisValue(MotionEvent.AXIS_VSCROLL,dy>0?-SCROLL_AXIS:SCROLL_AXIS);
                  MotionEvent ev=MotionEvent.obtain(t,t,MotionEvent.ACTION_SCROLL,1,pp,pc,
                      0,0,1f,1f,0,0,InputDevice.SOURCE_MOUSE,0);
                  webView.dispatchGenericMotionEvent(ev);ev.recycle();
              }
              @Override public boolean onKeyDown(int key,KeyEvent e){
                  if(inputFocused){
                      if(key==KeyEvent.KEYCODE_BACK){
                          // BACK khi đang nhập: blur input + ẩn keyboard
                          webView.evaluateJavascript("if(document.activeElement)document.activeElement.blur();",null);
                          inputFocused=false;
                          imm.hideSoftInputFromWindow(webView.getWindowToken(),0);
                          webView.setFocusable(false);webView.setFocusableInTouchMode(false);
                          return true;
                      }
                      // phím khác khi đang nhập: để WebView xử lý
                      return super.onKeyDown(key,e);
                  }
                  wakeC();
                  if(voiceOverlay.getVisibility()==View.VISIBLE){
                      if(key==KeyEvent.KEYCODE_BACK){hideVoice();return true;}return true;}
                  int rep=e.getRepeatCount();
                  switch(key){
                      case KeyEvent.KEYCODE_DPAD_UP:moveCursor(0,-1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:moveCursor(0,1,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:moveCursor(-1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT:moveCursor(1,0,rep);return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER:case KeyEvent.KEYCODE_ENTER:
                          if(rep==0)clickAt();return true;
                      case KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE:case KeyEvent.KEYCODE_MEDIA_PLAY:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v){if(v.paused)v.play();else v.pause();}",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_FAST_FORWARD:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);return true;
                      case KeyEvent.KEYCODE_MEDIA_REWIND:
                          webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);return true;
                      case KeyEvent.KEYCODE_MENU:showVoice();return true;
                      case KeyEvent.KEYCODE_BACK:
                          if(webView.canGoBack()){webView.goBack();return true;}finish();return true;
                  }
                  return super.onKeyDown(key,e);
              }
              @Override public boolean onKeyUp(int key,KeyEvent e){
                  if(!inputFocused&&(key==KeyEvent.KEYCODE_DPAD_UP||key==KeyEvent.KEYCODE_DPAD_DOWN
                      ||key==KeyEvent.KEYCODE_DPAD_LEFT||key==KeyEvent.KEYCODE_DPAD_RIGHT))stopEdge();
                  return super.onKeyUp(key,e);
              }
              private void setupSpeech(){
                  if(!SpeechRecognizer.isRecognitionAvailable(this))return;
                  speechRecognizer=SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener(){
                      @Override public void onReadyForSpeech(Bundle p){voiceResult.setText("Đang nghe...");}
                      @Override public void onResults(Bundle r){
                          ArrayList<String>m=r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if(m!=null&&!m.isEmpty()){final String tt=m.get(0).toLowerCase();
                          voiceResult.setText(m.get(0));
                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},800);
                          handleVoice(tt);}else hideVoice();}
                      @Override public void onError(int err){voiceResult.setText("Không nghe được!");
                          handler.postDelayed(new Runnable(){@Override public void run(){hideVoice();}},1500);}
                      @Override public void onBeginningOfSpeech(){}@Override public void onRmsChanged(float v){}
                      @Override public void onBufferReceived(byte[]b){}@Override public void onEndOfSpeech(){}
                      @Override public void onPartialResults(Bundle b){}@Override public void onEvent(int t,Bundle b){}
                  });
              }
              private void handleVoice(String t){
                  if(t.contains("phát")||t.contains("play"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.play();",null);
                  else if(t.contains("dừng")||t.contains("pause"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.pause();",null);
                  else if(t.contains("tua tới"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime+=10;",null);
                  else if(t.contains("tua lùi")||t.contains("quay lại"))
                      webView.evaluateJavascript("var v=document.querySelector('video');if(v)v.currentTime-=10;",null);
                  else if(t.contains("trang chủ")||t.contains("home"))finish();
                  else if(t.contains("cài đặt"))startActivity(new Intent(MainActivity.this,SettingsActivity.class));
              }
              private void showVoice(){
                  if(speechRecognizer==null)return;
                  voiceOverlay.setVisibility(View.VISIBLE);voiceResult.setText("");
                  Intent i=new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL,RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                  i.putExtra(RecognizerIntent.EXTRA_LANGUAGE,"vi-VN");
                  i.putExtra(RecognizerIntent.EXTRA_MAX_RESULTS,3);
                  speechRecognizer.startListening(i);
              }
              private void hideVoice(){
                  if(speechRecognizer!=null)speechRecognizer.stopListening();
                  voiceOverlay.setVisibility(View.GONE);}
              @Override protected void onPause(){
                  super.onPause();webView.onPause();
                  savedCX=cursorView.getCX();savedCY=cursorView.getCY();
                  stopEdge();handler.removeCallbacksAndMessages(null);}
              @Override protected void onResume(){super.onResume();webView.onResume();wakeC();}
              @Override protected void onDestroy(){
                  handler.removeCallbacksAndMessages(null);
                  if(speechRecognizer!=null)speechRecognizer.destroy();
                  webView.destroy();super.onDestroy();}
          }
