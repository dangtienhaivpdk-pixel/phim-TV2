              private SpeechRecognizer speechRecognizer;
              private static final String PREF="aio_prefs", KEY_URL="custom_url", DEF="https://www.rophimm.me";
              private Handler handler = new Handler();
              private float screenW=1920, screenH=1080;
              private static float savedCX=-1, savedCY=-1;
              private static final float STEP_MIN=14f, STEP_MAX=88f;
              private static final int ACCEL=12, SCR_AMT=280;
              private static final long HIDE_DELAY=4000;
              private boolean barVisible=true;
              private Runnable hideBar = new Runnable(){@Override public void run(){topBar.setVisibility(View.GONE);barVisible=false;}};
              private Runnable hideCursor = new Runnable(){@Override public void run(){cursorView.setVisibility(View.GONE);}};

              @Override protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  DisplayMetrics dm=new DisplayMetrics(); getWindowManager().getDefaultDisplay().getMetrics(dm);
                  screenW=dm.widthPixels; screenH=dm.heightPixels;
                  cursorView=(CursorView)findViewById(R.id.cursor);
                  float ix=savedCX>0?savedCX:screenW/2f, iy=savedCY>0?savedCY:screenH/2f;
                  cursorView.setPos(ix,iy); savedCX=ix; savedCY=iy;
                  handler.postDelayed(hideCursor, HIDE_DELAY);
                  SharedPreferences prefs=getSharedPreferences(PREF,Context.MODE_PRIVATE);
                  String loadUrl=prefs.getString(KEY_URL,DEF);
                  if(getIntent().hasExtra("url")) loadUrl=getIntent().getStringExtra("url");
                  final String fUrl=loadUrl;
                  webView=(ScrollWebView)findViewById(R.id.webview);
                  progressBar=(ProgressBar)findViewById(R.id.progress);
                  topBar=(LinearLayout)findViewById(R.id.topBar);
                  voiceOverlay=(RelativeLayout)findViewById(R.id.voiceOverlay);
                  voiceResult=(TextView)findViewById(R.id.voiceResult);
                  webView.setFocusable(false); webView.setFocusableInTouchMode(false);
                  webView.setLongClickable(false);
                  webView.setOnLongClickListener(new View.OnLongClickListener(){@Override public boolean onLongClick(View v){return true;}});
                  handler.postDelayed(hideBar, HIDE_DELAY);
                  findViewById(R.id.btnHome).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){finish();}});
                  findViewById(R.id.btnWebBack).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){if(webView.canGoBack())webView.goBack();}});
                  findViewById(R.id.btnVoice).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){showVoice();}});
                  findViewById(R.id.btnSettingsWeb).setOnClickListener(new View.OnClickListener(){@Override public void onClick(View v){
                      savedCX=cursorView.getCX(); savedCY=cursorView.getCY();
                      startActivity(new Intent(MainActivity.this,SettingsActivity.class));}});
                  setupSpeech(); setupWebView(); webView.loadUrl(fUrl);
              }

              private void wakeC() {
                  if(cursorView.getVisibility()!=View.VISIBLE) cursorView.setVisibility(View.VISIBLE);
                  handler.removeCallbacks(hideCursor); handler.postDelayed(hideCursor,HIDE_DELAY);
                  if(!barVisible){topBar.setVisibility(View.VISIBLE);barVisible=true;}
                  handler.removeCallbacks(hideBar); handler.postDelayed(hideBar,HIDE_DELAY);
              }

              private void moveCursor(float dx, float dy, int rep) {
                  wakeC();
                  float t=Math.min(1f,(float)rep/ACCEL);
                  float step=STEP_MIN+(STEP_MAX-STEP_MIN)*t;
                  float nx=Math.max(0,Math.min(screenW-2,cursorView.getCX()+dx*step));
                  float ny=Math.max(0,Math.min(screenH-2,cursorView.getCY()+dy*step));
                  cursorView.setPos(nx,ny); savedCX=nx; savedCY=ny;
              }

              private void click() {
                  int[] wl=new int[2]; webView.getLocationOnScreen(wl);
                  float rx=cursorView.getCX()-wl[0], ry=cursorView.getCY()-wl[1];
                  long t0=SystemClock.uptimeMillis();
                  MotionEvent dn=MotionEvent.obtain(t0,t0,MotionEvent.ACTION_DOWN,rx,ry,0);
                  webView.dispatchTouchEvent(dn); dn.recycle();
                  final float frx=rx, fry=ry; final long ft0=t0;
                  handler.postDelayed(new Runnable(){@Override public void run(){
                      long t1=SystemClock.uptimeMillis();
                      MotionEvent up=MotionEvent.obtain(ft0,t1,MotionEvent.ACTION_UP,frx,fry,0);
                      webView.dispatchTouchEvent(up); up.recycle();}},80);
              }

              private void scrollPage(int dy) {
                  webView.scrollBy(0,dy);
              }

              private void setupWebView() {
                  WebSettings ws=webView.getSettings();
                  ws.setJavaScriptEnabled(true); ws.setDomStorageEnabled(true);
                  ws.setMediaPlaybackRequiresUserGesture(false);
                  ws.setUseWideViewPort(true); ws.setLoadWithOverviewMode(true);
                  ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  ws.setBuiltInZoomControls(false); ws.setDisplayZoomControls(false);
                  ws.setAppCacheEnabled(true); ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                  ws.setRenderPriority(WebSettings.RenderPriority.HIGH);
                  ws.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36");
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE,null);
                  webView.setWebViewClient(new WebViewClient(){
                      @Override public boolean shouldOverrideUrlLoading(WebView v, String url){
                          if(url==null||(!url.startsWith("http://")&&!url.startsWith("https://")))return true;
                          v.loadUrl(url);return true;}
                      @TargetApi(Build.VERSION_CODES.N)
                      @Override public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest r){
                          String url=r.getUrl().toString();
                          if(!url.startsWith("http://")&&!url.startsWith("https://"))return true;
                          v.loadUrl(url);return true;}
                      @Override public void onPageStarted(WebView v, String url, Bitmap f){
                          progressBar.setVisibility(View.VISIBLE);
                          String domain=url.replace("https://","").replace("http://","").split("/")[0];
                          ((TextView)findViewById(R.id.txtTitle)).setText(domain);}
                      @Override public void onPageFinished(WebView v, String url){
                          progressBar.setVisibility(View.GONE);
                          // Landscape spoof + performance + hide rotate popup
                          v.evaluateJavascript("(function(){"
                              +"try{Object.defineProperty(screen,'orientation',{configurable:true,get:function(){"
                              +"return{type:'landscape-primary',angle:0,lock:function(){return Promise.resolve();},"
                              +"unlock:function(){},addEventListener:function(){},removeEventListener:function(){}};"
                              +"}})}catch(e){}"
                              +"try{Object.defineProperty(window,'orientation',{configurable:true,get:function(){return 0;}})}catch(e){}"
                              +"if(!document.getElementById('_aioS')){"
                              +"var s=document.createElement('style');s.id='_aioS';"
                              +"s.textContent='[class*=\"rotate\"],[class*=\"portrait\"],[class*=\"turn-device\"],[class*=\"landscape-warning\"],[id*=\"rotate\"],[class*=\"screen-rotate\"]{display:none!important;}';"
                              +"(document.head||document.documentElement).appendChild(s);}"
                              +"try{window.dispatchEvent(new Event('resize'));}catch(e){}"
                              +"document.documentElement.style.scrollBehavior='auto';"
                              +"if(document.body)document.body.style.overscrollBehavior='none';"
                              +"document.querySelectorAll('a[target]').forEach(function(a){if(a.target===\"_blank\")a.target=\"_self\";});"
                              +"})();",null);}
                      @Override public void onReceivedSslError(WebView v, SslErrorHandler h, SslError e){h.proceed();}
                  });
                  webView.setWebChromeClient(new WebChromeClient(){
                      @Override public void onProgressChanged(WebView v,int p){
                          progressBar.setProgress(p);progressBar.setVisibility(p<100?View.VISIBLE:View.GONE);}
                      @Override public boolean onCreateWindow(WebView v,boolean d,boolean u,android.os.Message m){
                          WebView.HitTestResult hr=v.getHitTestResult();
                          if(hr!=null&&hr.getExtra()!=null&&hr.getExtra().startsWith("http"))v.loadUrl(hr.getExtra());
                          return false;}
                  });
              }

              private void setupSpeech() {
                  if(!SpeechRecognizer.isRecognitionAvailable(this))return;
                  speechRecognizer=SpeechRecognizer.createSpeechRecognizer(this);
                  speechRecognizer.setRecognitionListener(new RecognitionListener(){
                      @Override public void onReadyForSpeech(Bundle p){voiceResult.setText("Dang nghe...");}
                      @Override public void onResults(Bundle r){
                          ArrayList<String> m=r.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                          if(m!=null&&!m.isEmpty()){
                              final String tt=m.get(0).toLowerCase(); voiceResult.setText(m.get(0));
