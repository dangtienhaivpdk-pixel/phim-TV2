          # ── CursorView: con trỏ vẽ mũi tên ──────────────────────────────────────────
          cat > src/com/allinone/app/CursorView.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.util.AttributeSet;
          import android.view.View;
          public class CursorView extends View {
              private final Paint fill, stroke, dot;
              public CursorView(Context c) { super(c); fill=mk(true); stroke=mkS(); dot=mkDot(); }
              public CursorView(Context c, AttributeSet a) { super(c,a); fill=mk(true); stroke=mkS(); dot=mkDot(); }
              private Paint mk(boolean f){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFFFFFFF);p.setStyle(f?Paint.Style.FILL:Paint.Style.STROKE);return p;}
              private Paint mkS(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFF000000);p.setStyle(Paint.Style.STROKE);p.setStrokeWidth(2.5f);p.setStrokeJoin(Paint.Join.ROUND);return p;}
              private Paint mkDot(){Paint p=new Paint(Paint.ANTI_ALIAS_FLAG);p.setColor(0xFFE50914);p.setStyle(Paint.Style.FILL);return p;}
              @Override protected void onDraw(Canvas c){
                  // Vẽ tại (0,0) - view được định vị bằng WindowManager params
                  Path p=new Path();
                  p.moveTo(2,2); p.lineTo(2,22); p.lineTo(7,16); p.lineTo(13,27);
                  p.lineTo(16,25); p.lineTo(10,14); p.lineTo(17,14); p.close();
                  c.drawPath(p,stroke); c.drawPath(p,fill);
                  c.drawCircle(2,2,3f,dot);
              }
          }
          ENDOFFILE

          # ── GlobalCursor: singleton WindowManager overlay ─────────────────────────
          cat > src/com/allinone/app/GlobalCursor.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.content.Context;
          import android.graphics.Canvas;
          import android.graphics.Paint;
          import android.graphics.Path;
          import android.graphics.PixelFormat;
          import android.os.Build;
          import android.view.View;
          import android.view.WindowManager;
          /**
           * Con trỏ chuột toàn màn hình dùng WindowManager.
           * Nằm trên TẤT CẢ mọi View: WebView, TopBar, Settings, HomeActivity.
           */
          public class GlobalCursor {
              private static GlobalCursor instance;
              private WindowManager wm;
              private CursorDrawView view;
              private WindowManager.LayoutParams params;
              private float x, y;
              private float screenW, screenH;
              private GlobalCursor(){}
              public static GlobalCursor get(){ if(instance==null)instance=new GlobalCursor(); return instance; }
              public void attach(Context ctx, float w, float h){
                  screenW=w; screenH=h;
                  if(x==0&&y==0){ x=w/2f; y=h/2f; }
                  if(wm!=null && view!=null){
                      try{ wm.removeView(view); }catch(Exception e){}
                  }
                  wm = (WindowManager) ctx.getApplicationContext().getSystemService(Context.WINDOW_SERVICE);
                  view = new CursorDrawView(ctx.getApplicationContext());
                  params = new WindowManager.LayoutParams(
                      50, 50,
                      (int)x, (int)y,
                      Build.VERSION.SDK_INT >= 26
                          ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY
                          : WindowManager.LayoutParams.TYPE_PHONE,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE
                      | WindowManager.LayoutParams.FLAG_NOT_TOUCHABLE
                      | WindowManager.LayoutParams.FLAG_LAYOUT_IN_SCREEN
                      | WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS,
                      PixelFormat.TRANSLUCENT);
                  params.gravity = android.view.Gravity.TOP | android.view.Gravity.LEFT;
                  params.x = (int)x;
                  params.y = (int)y;
                  wm.addView(view, params);
              }
              public void detach(){
                  if(wm!=null&&view!=null){ try{wm.removeView(view);}catch(Exception e){} view=null; }
              }
              public void move(float dx, float dy){
                  x = Math.max(0, Math.min(screenW-2, x+dx));
                  y = Math.max(0, Math.min(screenH-2, y+dy));
                  if(wm!=null&&view!=null&&params!=null){
                      params.x=(int)x; params.y=(int)y;
                      try{ wm.updateViewLayout(view,params); }catch(Exception e){}
                  }
              }
              public float getX(){ return x; }
              public float getY(){ return y; }
              // View nội bộ vẽ con trỏ
              static class CursorDrawView extends View {
                  private final Paint fill, stroke, dot;
                  CursorDrawView(Context c){
                      super(c);
                      setLayerType(LAYER_TYPE_HARDWARE,null);
                      fill=new Paint(Paint.ANTI_ALIAS_FLAG); fill.setColor(0xFFFFFFFF); fill.setStyle(Paint.Style.FILL);
                      stroke=new Paint(Paint.ANTI_ALIAS_FLAG); stroke.setColor(0xFF000000);
                      stroke.setStyle(Paint.Style.STROKE); stroke.setStrokeWidth(2.5f); stroke.setStrokeJoin(Paint.Join.ROUND);
                      dot=new Paint(Paint.ANTI_ALIAS_FLAG); dot.setColor(0xFFE50914); dot.setStyle(Paint.Style.FILL);
                  }
                  @Override protected void onDraw(Canvas c){
                      Path p=new Path();
                      p.moveTo(2,2); p.lineTo(2,22); p.lineTo(7,16); p.lineTo(13,27);
                      p.lineTo(16,25); p.lineTo(10,14); p.lineTo(17,14); p.close();
                      c.drawPath(p,stroke); c.drawPath(p,fill);
                      c.drawCircle(2,2,3.5f,dot);
                  }
              }
          }
          ENDOFFILE

          cat > src/com/allinone/app/ScrollWebView.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.content.Context;
          import android.util.AttributeSet;
          import android.webkit.WebView;
          public class ScrollWebView extends WebView {
              public interface OnScrollChangedCallback { void onScrollUp(); void onScrollDown(); }
              private OnScrollChangedCallback cb;
              public ScrollWebView(Context c){super(c);}
              public ScrollWebView(Context c,AttributeSet a){super(c,a);}
              public void setOnScrollChangedCallback(OnScrollChangedCallback c){cb=c;}
              @Override protected void onScrollChanged(int l,int t,int ol,int ot){
                  super.onScrollChanged(l,t,ol,ot);
                  if(cb!=null){if(t<ot)cb.onScrollUp();else if(t>ot)cb.onScrollDown();}
              }
          }
          ENDOFFILE

          # ── BaseActivity: cung cấp con trỏ cho mọi Activity ──────────────────────
          cat > src/com/allinone/app/BaseActivity.java << 'ENDOFFILE'
          package com.allinone.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.util.DisplayMetrics;
          import android.view.KeyEvent;
          import android.view.View;
          public abstract class BaseActivity extends Activity {
              protected GlobalCursor cursor;
              protected float screenW, screenH;
              protected static final float STEP=28f, STEP_FAST=85f;
              @Override protected void onCreate(Bundle s){
                  super.onCreate(s);
                  DisplayMetrics dm=new DisplayMetrics();
                  getWindowManager().getDefaultDisplay().getMetrics(dm);
                  screenW=dm.widthPixels; screenH=dm.heightPixels;
                  cursor=GlobalCursor.get();
              }
              @Override protected void onResume(){
                  super.onResume();
                  cursor.attach(this, screenW, screenH);
              }
              @Override protected void onPause(){
                  super.onPause();
                  cursor.detach();
              }
              // Di chuyển con trỏ và highlight View bên dưới
              protected void moveCursor(float dx, float dy){
                  cursor.move(dx,dy);
                  highlightUnder();
              }
              // Tìm view bên dưới con trỏ và highlight
              private View lastHighlight=null;
              protected void highlightUnder(){
                  float cx=cursor.getX(), cy=cursor.getY();
                  View root=getWindow().getDecorView();
                  View found=findViewAt(root, (int)cx, (int)cy);
                  if(lastHighlight!=null && lastHighlight!=found){
                      lastHighlight.setBackgroundColor(android.graphics.Color.TRANSPARENT);
                      // Restore original - đơn giản chỉ clear highlight đặc biệt
                      lastHighlight.setSelected(false);
                      lastHighlight=null;
                  }
                  if(found!=null){
                      found.setSelected(true);
                      lastHighlight=found;
                  }
              }
              // Click view bên dưới con trỏ
              protected boolean clickUnder(){
                  float cx=cursor.getX(), cy=cursor.getY();
                  View root=getWindow().getDecorView();
                  View found=findClickableAt(root,(int)cx,(int)cy);
                  if(found!=null){ found.performClick(); return true; }
                  return false;
              }
              // DFS tìm view clickable tại toạ độ màn hình
              private View findClickableAt(View v, int x, int y){
                  if(!isViewAt(v,x,y)) return null;
                  if(v instanceof android.view.ViewGroup){
                      android.view.ViewGroup vg=(android.view.ViewGroup)v;
                      for(int i=vg.getChildCount()-1;i>=0;i--){
                          View child=vg.getChildAt(i);
                          View r=findClickableAt(child,x,y);
                          if(r!=null)return r;
                      }
                  }
                  if((v.isClickable()||v.isFocusable())&&v.getVisibility()==View.VISIBLE
                      && !(v instanceof android.view.ViewGroup && ((android.view.ViewGroup)v).getChildCount()>0)){
                      return v;
                  }
                  if(v.isClickable()&&v.getVisibility()==View.VISIBLE) return v;
                  return null;
              }
              private View findViewAt(View v, int x, int y){
                  if(!isViewAt(v,x,y)) return null;
                  if(v instanceof android.view.ViewGroup){
                      android.view.ViewGroup vg=(android.view.ViewGroup)v;
                      for(int i=vg.getChildCount()-1;i>=0;i--){
                          View r=findViewAt(vg.getChildAt(i),x,y);
                          if(r!=null)return r;
                      }
                  }
                  return v;
              }
              private boolean isViewAt(View v, int x, int y){
                  if(v.getVisibility()!=View.VISIBLE)return false;
                  int[]loc=new int[2]; v.getLocationOnScreen(loc);
                  return x>=loc[0]&&x<loc[0]+v.getWidth()&&y>=loc[1]&&y<loc[1]+v.getHeight();
              }
              @Override public boolean onKeyDown(int keyCode, KeyEvent event){
                  float step=(event.getRepeatCount()>6)?STEP_FAST:STEP;
                  switch(keyCode){
                      case KeyEvent.KEYCODE_DPAD_UP:    moveCursor(0,-step); return true;
                      case KeyEvent.KEYCODE_DPAD_DOWN:  moveCursor(0, step); return true;
                      case KeyEvent.KEYCODE_DPAD_LEFT:  moveCursor(-step,0); return true;
                      case KeyEvent.KEYCODE_DPAD_RIGHT: moveCursor( step,0); return true;
                      case KeyEvent.KEYCODE_DPAD_CENTER:
                      case KeyEvent.KEYCODE_ENTER:
                          if(!clickUnder()) onCursorClick();
                          return true;
                  }
                  return super.onKeyDown(keyCode,event);
              }
              // Override để xử lý click đặc biệt (vd: WebView)
              protected void onCursorClick(){}
          }
