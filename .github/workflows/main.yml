                  android:background="#111122" android:paddingLeft="40dp" android:paddingRight="40dp"
                  android:focusable="false">
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content"
                      android:layout_weight="1" android:text="ALL IN ONE"
                      android:textSize="32sp" android:textColor="#E50914" android:textStyle="bold"
                      android:focusable="false"/>
                  <TextView android:id="@+id/btnSettings"
                      android:layout_width="wrap_content" android:layout_height="wrap_content"
                      android:text="&#9881; Cài đặt" android:textSize="16sp" android:textColor="#ffffff"
                      android:padding="12dp" android:focusable="false" android:clickable="true"/>
              </LinearLayout>
              <ScrollView android:id="@+id/scrollView"
                  android:layout_width="match_parent" android:layout_height="match_parent"
