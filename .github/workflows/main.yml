name: Build RoPhim TV APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/28.0.3" >> $GITHUB_PATH

      - name: Create project files
        run: |
          mkdir -p src/com/rophimtv/app res/layout res/values res/drawable

          python3 -c "
          import struct, zlib
          def make_png(w, h, get_pixel):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += bytes(get_pixel(x, y))
              compressed = zlib.compress(raw, 9)
              png = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>II', w, h) + bytes([8, 6, 0, 0, 0])
              png += chunk(b'IHDR', ihdr)
              png += chunk(b'IDAT', compressed)
              png += chunk(b'IEND', b'')
              return png
          def icon_pixel(x, y):
              cx, cy, r = 48, 48, 46
              dx, dy = x-cx, y-cy
              if dx*dx + dy*dy <= r*r:
                  if x >= 33 and x <= 64 and abs(dy) <= (x-30)*0.55:
                      return [255, 255, 255, 255]
                  t = (dx*dx + dy*dy) / (r*r)
                  return [int(229 - t*30), 9, 20, 255]
              return [0, 0, 0, 0]
          with open('res/drawable/ic_launcher.png','wb') as f:
              f.write(make_png(96, 96, icon_pixel))
          def banner_pixel(x, y):
              if x < 8:
                  return [229, 9, 20, 255]
              return [int(13+(x/320)*10), int(13+(y/180)*5), int(26+(x/320)*15), 255]
          with open('res/drawable/banner.png','wb') as f:
              f.write(make_png(320, 180, banner_pixel))
          print('Icons OK')
          "

          cat > AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.rophimtv.app"
              android:versionCode="1"
              android:versionName="1.0">
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="28" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
              <uses-feature android:name="android.software.leanback" android:required="false" />
              <application
                  android:label="RoPhim TV"
                  android:icon="@drawable/ic_launcher"
                  android:banner="@drawable/banner"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          ENDOFFILE

          cat > res/layout/main.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
              <ProgressBar android:id="@+id/progress"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="6dp"
                  android:layout_alignParentTop="true"
                  android:max="100"
                  android:progressTint="#E50914"
                  android:visibility="gone" />
          </RelativeLayout>
          ENDOFFILE

          cat > res/values/strings.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">RoPhim TV</string>
          </resources>
          ENDOFFILE

          cat > src/com/rophimtv/app/MainActivity.java << 'ENDOFFILE'
          package com.rophimtv.app;
          import android.app.Activity;
          import android.graphics.Bitmap;
          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.ProgressBar;
          import android.net.http.SslError;
          import android.webkit.SslErrorHandler;
          public class MainActivity extends Activity {
              private WebView webView;
              private ProgressBar progressBar;
              private static final String HOME = "https://pointnorth.io";
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.main);
                  webView = (WebView) findViewById(R.id.webview);
                  progressBar = (ProgressBar) findViewById(R.id.progress);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setUseWideViewPort(true);
                  s.setLoadWithOverviewMode(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  s.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
                  webView.setWebViewClient(new WebViewClient() {
                      @Override public void onPageStarted(WebView v, String url, Bitmap f) { progressBar.setVisibility(View.VISIBLE); }
                      @Override public void onPageFinished(WebView v, String url) { progressBar.setVisibility(View.GONE); }
                      @Override public void onReceivedSslError(WebView v, SslErrorHandler h, SslError e) { h.proceed(); }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override public void onProgressChanged(WebView v, int p) {
                          progressBar.setProgress(p);
                          progressBar.setVisibility(p < 100 ? View.VISIBLE : View.GONE);
                      }
                  });
                  webView.setFocusable(true);
                  webView.setFocusableInTouchMode(true);
                  webView.loadUrl(HOME);
              }
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_DPAD_UP) { webView.scrollBy(0, -200); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_DOWN) { webView.scrollBy(0, 200); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_LEFT) { webView.scrollBy(-200, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_DPAD_RIGHT) { webView.scrollBy(200, 0); return true; }
                  if (keyCode == KeyEvent.KEYCODE_BACK) {
                      if (webView.canGoBack()) { webView.goBack(); return true; }
                  }
                  if (keyCode == KeyEvent.KEYCODE_HOME) { webView.loadUrl(HOME); return true; }
                  return super.onKeyDown(keyCode, event);
              }
              @Override protected void onPause() { super.onPause(); webView.onPause(); }
              @Override protected void onResume() { super.onResume(); webView.onResume(); }
              @Override protected void onDestroy() { webView.destroy(); super.onDestroy(); }
          }
          ENDOFFILE

      - name: Build APK
        run: |
          mkdir -p build/classes build/gen
          $ANDROID_HOME/build-tools/28.0.3/aapt package -f -m \
            -I $ANDROID_HOME/platforms/android-28/android.jar \
            -M AndroidManifest.xml \
            -S res \
            -J build/gen \
            -F build/resources.ap_
          javac -source 8 -target 8 \
            -classpath $ANDROID_HOME/platforms/android-28/android.jar \
            -d build/classes \
            build/gen/com/rophimtv/app/R.java \
            src/com/rophimtv/app/MainActivity.java
          $ANDROID_HOME/build-tools/28.0.3/dx \
            --dex --output=build/classes.dex \
            build/classes
          cp build/resources.ap_ build/rophim.apk
          cd build && zip -u rophim.apk classes.dex && cd ..
          $ANDROID_HOME/build-tools/28.0.3/zipalign -f 4 build/rophim.apk build/aligned.apk
          keytool -genkey -v -keystore key.jks -alias key -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=RoPhim,O=RoPhim,C=VN"
          $ANDROID_HOME/build-tools/28.0.3/apksigner sign \
            --ks key.jks --ks-pass pass:android --key-pass pass:android \
            --out RoPhimTV.apk build/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RoPhimTV
          path: RoPhimTV.apk
          retention-days: 30
