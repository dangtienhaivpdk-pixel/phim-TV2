name: Build HAI TV APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-28" "build-tools;28.0.3"
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/build-tools/28.0.3" >> $GITHUB_PATH

      - name: Create project files
        run: |
          mkdir -p src/com/haitv/app res/layout res/values res/drawable

          python3 -c "
          import struct, zlib, math

          def make_png(w, h, get_pixel):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      raw += bytes(get_pixel(x, y))
              png = b'\x89PNG\r\n\x1a\n'
              ihdr = struct.pack('>II', w, h) + bytes([8, 6, 0, 0, 0])
              png += chunk(b'IHDR', ihdr)
              png += chunk(b'IDAT', zlib.compress(raw, 9))
              png += chunk(b'IEND', b'')
              return png

          def icon_pixel(x, y):
              w, h = 96, 96
              cx, cy, r = 48, 48, 46
              dx, dy = x - cx, y - cy
              if dx*dx + dy*dy > r*r:
                  return [0, 0, 0, 0]
              if dx*dx + dy*dy > 40*40:
                  return [180, 150, 80, 255]
              film_top = 8
              film_bot = h - 8
              strip_h = 14
              in_top_strip = (film_top <= y <= film_top + strip_h)
              in_bot_strip = (film_bot - strip_h <= y <= film_bot)
              if in_top_strip or in_bot_strip:
                  sx = (x - 4) % 16
                  if in_top_strip:
                      sy = y - film_top - 3
                  else:
                      sy = y - (film_bot - strip_h) - 3
                  if 2 <= sx <= 10 and 2 <= sy <= 8:
                      return [220, 210, 180, 255]
                  return [60, 40, 20, 255]
              rel_y = y - (film_top + strip_h + 1)
              scene_h = (film_bot - strip_h) - (film_top + strip_h + 1)
              if scene_h > 0:
                  t = rel_y / scene_h
                  noise = ((x * 13 + y * 7) % 20) - 10
                  if t < 0.45:
                      base_r = int(200 + noise); base_g = int(170 + noise); base_b = int(120 + noise//2)
                  elif t < 0.55:
                      base_r = int(140 + noise); base_g = int(100 + noise); base_b = int(60 + noise//2)
                  else:
                      base_r = int(120 + noise); base_g = int(85 + noise); base_b = int(45 + noise//2)
                  px = 48
                  if 0.30 <= t <= 0.42 and abs(x - px) <= 5: return [30, 20, 10, 255]
                  if 0.42 <= t <= 0.65 and abs(x - px) <= 3: return [30, 20, 10, 255]
                  if 0.65 <= t <= 0.80:
                      if abs(x-(px-3)) <= 2 or abs(x-(px+3)) <= 2: return [30, 20, 10, 255]
                  return [max(0,min(255,base_r)), max(0,min(255,base_g)), max(0,min(255,base_b)), 255]
              return [20, 20, 20, 255]

          with open('res/drawable/ic_launcher.png','wb') as f:
              f.write(make_png(96, 96, icon_pixel))

          def banner_pixel(x, y):
              w, h = 320, 180
              noise = ((x * 13 + y * 7) % 20) - 10
              t_y = y / h
              if t_y < 0.4:
                  base_r = int(180 + noise); base_g = int(150 + noise); base_b = int(100 + noise//2)
              elif t_y < 0.55:
                  base_r = int(120 + noise); base_g = int(90 + noise); base_b = int(50 + noise//2)
              else:
                  base_r = int(100 + noise); base_g = int(70 + noise); base_b = int(35 + noise//2)
              strip_h = 20
              in_top = y <= strip_h
              in_bot = y >= h - strip_h
              if in_top or in_bot:
                  sx = (x - 4) % 24
                  sy = y - 3 if in_top else y - (h - strip_h) - 3
                  if 3 <= sx <= 16 and 3 <= sy <= 12:
                      return [220, 210, 180, 255]
                  return [40, 25, 10, 255]
              px = 160
              if 0.30 <= t_y <= 0.42 and abs(x-px) <= 6: return [20, 12, 5, 255]
              if 0.42 <= t_y <= 0.65 and abs(x-px) <= 4: return [20, 12, 5, 255]
              if 0.65 <= t_y <= 0.82:
                  if abs(x-(px-5)) <= 3 or abs(x-(px+5)) <= 3: return [20, 12, 5, 255]
              # Chữ HAI TV sepia trắng
              lx, ly = x - 20, y - 75
              if 0<=lx<=6 and 0<=ly<=30: return [255,245,220,255]
              if 0<=lx<=22 and 13<=ly<=17: return [255,245,220,255]
              if 16<=lx<=22 and 0<=ly<=30: return [255,245,220,255]
              lx2 = lx - 32
              if 0<=lx2<=3 and 8<=ly<=30: return [255,245,220,255]
              if 19<=lx2<=22 and 8<=ly<=30: return [255,245,220,255]
              if 0<=lx2<=22 and 5<=ly<=9: return [255,245,220,255]
              if 0<=lx2<=22 and 18<=ly<=22: return [255,245,220,255]
              lx3 = lx - 62
              if 0<=lx3<=16 and 0<=ly<=4: return [255,245,220,255]
              if 6<=lx3<=10 and 0<=ly<=30: return [255,245,220,255]
              if 0<=lx3<=16 and 26<=ly<=30: return [255,245,220,255]
              lx4, ly4 = x - 110, y - 75
              if 0<=lx4<=22 and 0<=ly4<=4: return [229,9,20,255]
              if 9<=lx4<=13 and 0<=ly4<=30: return [229,9,20,255]
              lx5 = lx4 - 32
              if 0<=lx5<=3 and 0<=ly4<=30: return [229,9,20,255]
              if 0<=lx5<=22 and 13<=ly4<=17: return [229,9,20,255]
              if 19<=lx5<=22 and 0<=ly4<=30: return [229,9,20,255]
              return [max(0,min(255,base_r)), max(0,min(255,base_g)), max(0,min(255,base_b)), 255]

          with open('res/drawable/banner.png','wb') as f:
              f.write(make_png(320, 180, banner_pixel))
          print('Icons OK')
          "

          cat > AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.haitv.app"
              android:versionCode="1"
              android:versionName="1.0">
