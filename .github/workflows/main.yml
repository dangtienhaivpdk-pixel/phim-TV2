                          List<String> list=getHist();list.remove(url);
                          StringBuilder sb=new StringBuilder();for(int i=0;i<list.size();i++){if(i>0)sb.append(SEP);sb.append(list.get(i));}
                          prefs.edit().putString(KEY_HIST,sb.toString()).apply();renderHistory();
                      }});
                      row.addView(bu);row.addView(bd);listUrls.addView(row);
                  }
              }
              @Override public boolean onKeyDown(int k,KeyEvent e){
                  if(k==KeyEvent.KEYCODE_BACK){finish();return true;}
                  return super.onKeyDown(k,e);
              }
